<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AI Gateway — 交互原型（研发参考）</title>
<style>
  /* ============ 设计 token（与同目录「记忆库管理-交互原型」保持一致） ============ */
  :root {
    --primary: #007AFF; --primary-dark: #0066DD;
    --bg: #f5f5f7; --card: #ffffff; --border: #e5e7eb;
    --text: #1f2937; --text-light: #6b7280; --text-lighter: #9ca3af;
    --green: #22c55e; --green-bg: #f0fdf4; --green-text: #15803d;
    --amber: #f59e0b; --amber-bg: #fffbeb; --amber-text: #b45309;
    --blue: #3b82f6; --blue-bg: #eff6ff; --blue-text: #1d4ed8;
    --purple: #8b5cf6; --purple-bg: #f5f3ff; --purple-text: #6d28d9;
    --emerald: #10b981; --emerald-bg: #ecfdf5; --emerald-text: #047857;
    --red: #ef4444; --red-bg: #fef2f2; --red-text: #b91c1c;
    --teal: #14b8a6; --teal-bg: #f0fdfa; --teal-text: #0f766e;
    --violet: #8b5cf6; --violet-bg: #f5f3ff; --violet-text: #6d28d9;
    --gray-bg: #f3f4f6; --gray-text: #6b7280;
    --yellow: #eab308; --yellow-bg: #fefce8; --yellow-text: #a16207;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: -apple-system, "PingFang SC", "Helvetica Neue", sans-serif; background: var(--bg); color: var(--text); font-size: 14px; line-height: 1.5; -webkit-font-smoothing: antialiased; }
  .app { max-width: 1280px; margin: 0 auto; padding: 24px; }
  .mono { font-family: ui-monospace, "SF Mono", "Cascadia Code", monospace; }

  /* ============ 通用基础件 ============ */
  .btn { border: 1px solid var(--border); background: var(--card); padding: 6px 14px; border-radius: 8px; cursor: pointer; font-size: 13px; color: var(--text); transition: all .15s; display: inline-flex; align-items: center; gap: 4px; }
  .btn:hover { background: var(--gray-bg); }
  .btn-primary { background: var(--primary); color: #fff; border-color: var(--primary); }
  .btn-primary:hover { background: var(--primary-dark); }
  .btn-danger { color: var(--red); border-color: #fecaca; }
  .btn-danger:hover { background: var(--red-bg); }
  .btn-sm { padding: 4px 10px; font-size: 12px; }
  .btn-ghost { border-color: transparent; background: transparent; }
  .btn:disabled { opacity: .5; cursor: not-allowed; }

  select, input[type=text], input[type=number], input[type=password], input[type=date], textarea {
    border: 1px solid var(--border); border-radius: 8px; padding: 6px 10px; font-size: 13px; background: var(--card); outline: none; font-family: inherit; color: var(--text); width: 100%;
  }
  select:focus, input:focus, textarea:focus { border-color: var(--primary); box-shadow: 0 0 0 3px rgba(0,122,255,.15); }
  textarea { resize: vertical; }

  .badge { display: inline-flex; align-items: center; gap: 3px; padding: 2px 8px; border-radius: 999px; font-size: 11px; font-weight: 500; white-space: nowrap; }
  .b-green { background: var(--green-bg); color: var(--green-text); }
  .b-amber { background: var(--amber-bg); color: var(--amber-text); }
  .b-blue { background: var(--blue-bg); color: var(--blue-text); }
  .b-purple { background: var(--purple-bg); color: var(--purple-text); }
  .b-red { background: var(--red-bg); color: var(--red-text); }
  .b-gray { background: var(--gray-bg); color: var(--gray-text); }
  .b-teal { background: var(--teal-bg); color: var(--teal-text); }
  .b-yellow { background: var(--yellow-bg); color: var(--yellow-text); }
  .b-primary { background: rgba(0,122,255,.1); color: var(--primary); }

  .ic { width: 1em; height: 1em; vertical-align: -2px; display: inline-block; fill: none; stroke: currentColor; stroke-width: 2; stroke-linecap: round; stroke-linejoin: round; }
  .ic-fill { fill: currentColor; stroke: none; }
  .icon-btn { border: none; background: transparent; padding: 4px; border-radius: 6px; cursor: pointer; color: var(--text-lighter); display: inline-flex; font-size: 16px; transition: all .15s; }
  .icon-btn:hover { background: var(--gray-bg); }
  .icon-btn.t-green:hover { color: var(--green-text); }
  .icon-btn.t-primary:hover { color: var(--primary); }
  .icon-btn.t-red:hover { color: var(--red); }

  /* ============ 页面级 ============ */
  .page-head { margin-bottom: 16px; }
  .page-head h1 { font-size: 18px; font-weight: 600; }
  .page-head .desc { font-size: 12px; color: var(--text-lighter); margin-top: 2px; }

  .date-filter { display: flex; align-items: center; gap: 8px; flex-wrap: wrap; margin-bottom: 14px; }
  .date-filter input[type=date] { width: 150px; padding: 5px 8px; }
  .date-filter .sep { color: var(--text-lighter); font-size: 12px; }
  .quick-range { display: flex; gap: 6px; }

  .stat-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 12px; margin-bottom: 16px; }
  .stat { background: var(--card); border: 1px solid var(--border); border-radius: 12px; padding: 14px; display: flex; align-items: center; gap: 10px; }
  .stat .stat-ic { width: 36px; height: 36px; border-radius: 9px; display: flex; align-items: center; justify-content: center; font-size: 19px; flex-shrink: 0; }
  .stat .stat-ic.c-blue { background: var(--blue-bg); color: var(--blue); }
  .stat .stat-ic.c-purple { background: var(--purple-bg); color: var(--purple); }
  .stat .stat-ic.c-amber { background: var(--amber-bg); color: var(--amber); }
  .stat .stat-ic.c-red { background: var(--red-bg); color: var(--red); }
  .stat .stat-info .label { font-size: 11px; color: var(--text-lighter); }
  .stat .stat-info .value { font-size: 20px; font-weight: 600; line-height: 1.2; }

  /* ============ Tab 栏（下划线式） ============ */
  .tab-bar { display: flex; gap: 4px; border-bottom: 1px solid var(--border); margin-bottom: 16px; }
  .tab-btn { border: none; background: transparent; padding: 8px 16px; cursor: pointer; font-size: 14px; color: var(--text-light); border-bottom: 2px solid transparent; margin-bottom: -1px; transition: all .15s; }
  .tab-btn:hover { color: var(--text); }
  .tab-btn.active { color: var(--primary); border-bottom-color: var(--primary); font-weight: 500; }

  /* ============ 模型管理 ============ */
  .toolbar { display: flex; align-items: center; justify-content: space-between; margin-bottom: 14px; }
  .toolbar .count { font-size: 12px; color: var(--text-light); display: flex; align-items: center; gap: 6px; }
  .demo-toggle { display: inline-flex; align-items: center; gap: 4px; padding: 5px 10px; font-size: 12px; border-radius: 8px; border: 1px solid var(--border); cursor: pointer; color: var(--text-light); transition: all .15s; background: var(--card); }
  .demo-toggle:hover { background: var(--gray-bg); }
  .demo-toggle.on { border-color: #fcd34d; color: var(--amber-text); background: var(--amber-bg); }

  .model-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 12px; }
  .model-card { background: var(--card); border: 1px solid var(--border); border-radius: 12px; padding: 16px; }
  .mc-head { display: flex; align-items: flex-start; justify-content: space-between; margin-bottom: 8px; }
  .mc-title { display: flex; align-items: center; gap: 8px; }
  .mc-title .name { font-weight: 500; font-size: 14px; color: var(--text); }
  .mc-title .lat { font-size: 10px; font-weight: 500; }
  .mc-title .lat.h-green { color: var(--green-text); }
  .mc-title .lat.h-amber { color: var(--amber-text); }
  .mc-title .lat.h-gray { color: var(--text-lighter); }
  .mc-title .checking { font-size: 10px; color: var(--amber-text); }
  .health-dot { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; }
  .health-dot.h-healthy { background: var(--green); }
  .health-dot.h-degraded { background: var(--amber); }
  .health-dot.h-unreachable, .health-dot.h-unhealthy { background: var(--red); }
  .health-dot.h-unconfigured, .health-dot.h-unknown { background: var(--text-lighter); }

  .mc-desc { font-size: 12px; color: var(--text-light); margin-bottom: 8px; }
  .mc-tags { display: flex; align-items: center; gap: 6px; font-size: 11px; color: var(--text-lighter); margin-bottom: 8px; flex-wrap: wrap; }
  .mc-tags .tag-gray { padding: 2px 6px; border-radius: 5px; background: var(--gray-bg); color: var(--gray-text); }
  .mc-tags .tag-blue { padding: 2px 6px; border-radius: 5px; background: var(--blue-bg); color: var(--blue); }
  .mc-price { display: flex; align-items: center; gap: 12px; font-size: 11px; color: var(--text-light); margin-bottom: 12px; flex-wrap: wrap; }
  .mc-price b { font-weight: 500; color: var(--text); }
  .mc-foot { display: flex; align-items: center; justify-content: space-between; padding-top: 8px; border-top: 1px solid #f3f4f6; }
  .grant-pill { display: inline-flex; align-items: center; gap: 4px; font-size: 11px; padding: 3px 9px; border-radius: 999px; cursor: pointer; transition: all .15s; border: none; }
  .grant-pill.has { background: rgba(0,122,255,.1); color: var(--primary); }
  .grant-pill.has:hover { background: rgba(0,122,255,.18); }
  .grant-pill.empty { background: var(--gray-bg); color: var(--text-light); }
  .grant-pill.empty:hover { background: #e5e7eb; }
  .grant-pill b { font-weight: 600; }
  .mc-actions { display: flex; align-items: center; gap: 2px; }

  /* Toggle 开关 */
  .toggle { position: relative; width: 34px; height: 20px; border-radius: 999px; border: none; cursor: pointer; background: #e5e7eb; transition: background .15s; flex-shrink: 0; padding: 0; }
  .toggle .knob { position: absolute; top: 2px; left: 2px; width: 16px; height: 16px; border-radius: 50%; background: #fff; box-shadow: 0 1px 2px rgba(0,0,0,.2); transition: transform .15s; }
  .toggle[aria-checked="true"] { background: var(--primary); }
  .toggle[aria-checked="true"] .knob { transform: translateX(14px); }

  .empty-block { grid-column: 1 / -1; text-align: center; padding: 40px; color: var(--text-lighter); font-size: 13px; }

  /* ============ 故障转移 ============ */
  .failover { background: var(--card); border: 1px solid var(--border); border-radius: 12px; padding: 16px; margin-top: 14px; }
  .failover h3 { font-size: 14px; font-weight: 500; display: flex; align-items: center; gap: 8px; }
  .failover .fo-desc { font-size: 11px; color: var(--text-lighter); margin-top: 2px; }
  .fo-row { display: flex; gap: 8px; font-size: 13px; margin-top: 6px; align-items: center; }
  .fo-row .lbl { color: var(--text-lighter); width: 80px; flex-shrink: 0; }
  .fo-chain { color: var(--text-light); font-size: 12px; }
  .fo-empty-tip { color: var(--amber-text); font-size: 12px; }
  .fo-none { font-size: 12px; color: var(--text-lighter); padding: 4px 0; }
  .fo-edit { margin-top: 10px; }
  .fo-edit .field { margin-bottom: 10px; }
  .fo-edit .field label { font-size: 12px; color: var(--text-light); display: block; margin-bottom: 4px; }
  .fo-selected { margin-bottom: 8px; padding: 8px; background: var(--gray-bg); border-radius: 8px; }
  .fo-sel-item { display: flex; align-items: center; gap: 8px; font-size: 13px; padding: 2px; margin: 0 -4px; border-radius: 4px; }
  .fo-sel-item.draggable { cursor: grab; }
  .fo-sel-item.draggable:active { cursor: grabbing; }
  .fo-sel-item.drag-over { border-top: 2px solid var(--primary); }
  .fo-sel-item.dragging { opacity: .4; }
  .fo-sel-item .ord { width: 16px; text-align: center; font-size: 12px; color: var(--text-lighter); }
  .fo-sel-item .rm { padding: 2px; color: var(--text-lighter); cursor: pointer; border: none; background: transparent; font-size: 14px; }
  .fo-sel-item .rm:hover { color: var(--red); }
  .fo-cand { display: flex; align-items: center; gap: 8px; font-size: 13px; color: var(--text-light); cursor: pointer; padding: 2px 0; }
  .fo-cand:hover { color: var(--primary); }
  .fo-cand input { width: auto; }

  /* ============ 抽屉 ============ */
  .drawer-mask { position: fixed; inset: 0; background: rgba(0,0,0,.4); z-index: 60; opacity: 0; transition: opacity .2s; pointer-events: none; }
  .drawer-mask.show { opacity: 1; pointer-events: auto; }
  .drawer { position: fixed; top: 0; right: 0; bottom: 0; background: var(--card); z-index: 61; display: flex; flex-direction: column; transform: translateX(100%); transition: transform .25s; box-shadow: -8px 0 30px rgba(0,0,0,.1); }
  .drawer.show { transform: translateX(0); }
  .drawer.w-480 { width: 480px; }
  .drawer.w-560 { width: 560px; }
  .drawer.w-600 { width: 600px; }
  .drawer-head { display: flex; align-items: center; justify-content: space-between; padding: 16px 20px; border-bottom: 1px solid var(--border); flex-shrink: 0; }
  .drawer-head h3 { font-size: 15px; font-weight: 600; }
  .drawer-body { flex: 1; overflow-y: auto; padding: 16px 20px; min-height: 0; }
  .drawer-foot { padding: 12px 20px; border-top: 1px solid var(--border); flex-shrink: 0; }

  /* 表单分区 */
  .form-section { margin-bottom: 14px; }
  .form-section + .form-section { padding-top: 14px; border-top: 1px solid #f3f4f6; }
  .form-section h4 { font-size: 11px; font-weight: 500; color: var(--text-lighter); text-transform: uppercase; letter-spacing: .05em; margin-bottom: 10px; display: flex; align-items: center; gap: 4px; }
  .field { margin-bottom: 10px; }
  .field label { font-size: 12px; color: var(--text-light); display: block; margin-bottom: 3px; }
  .field label .req { color: var(--red); }
  .field label .hint { color: var(--text-lighter); font-weight: normal; margin-left: 4px; }
  .field .err-msg { font-size: 11px; color: var(--red); margin-top: 3px; }
  .field input.err, .field select.err, .field textarea.err { border-color: var(--red); background: var(--red-bg); }
  .grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
  .grid-3 { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 10px; }

  .info-box { display: flex; gap: 8px; padding: 10px; border-radius: 8px; font-size: 11.5px; margin-bottom: 12px; line-height: 1.5; }
  .info-box.amber { background: rgba(245,158,11,.08); border: 1px solid #fde68a; color: var(--amber-text); }
  .info-box.violet { background: rgba(139,92,246,.07); border: 1px solid #ddd6fe; color: var(--violet-text); }
  .info-box .ib-ic { flex-shrink: 0; margin-top: 1px; font-size: 14px; }

  /* 授权灰条入口 */
  .grant-entry { width: 100%; display: flex; align-items: center; justify-content: space-between; padding: 8px 12px; font-size: 13px; border: 1px solid var(--border); border-radius: 8px; cursor: pointer; background: var(--card); }
  .grant-entry:hover { background: var(--gray-bg); }
  .grant-entry .ge-r { display: flex; align-items: center; gap: 2px; color: var(--primary); font-size: 12px; }
  .grant-entry.disabled { background: var(--gray-bg); cursor: default; color: var(--text-lighter); display: flex; gap: 8px; font-size: 12px; }
  .grant-entry.disabled:hover { background: var(--gray-bg); }

  /* ============ Agent 授权抽屉 ============ */
  .grants-top { padding-bottom: 12px; border-bottom: 1px solid #f3f4f6; }
  .search-box { position: relative; flex: 1; }
  .search-box .ic { position: absolute; left: 10px; top: 50%; transform: translateY(-50%); color: var(--text-lighter); font-size: 14px; }
  .search-box input { padding-left: 32px; }
  .segmented { display: inline-flex; background: var(--gray-bg); border-radius: 8px; padding: 2px; }
  .segmented button { border: none; background: transparent; padding: 5px 12px; font-size: 12px; border-radius: 6px; cursor: pointer; color: var(--text-light); transition: all .15s; }
  .segmented button.active { background: var(--card); color: var(--primary); font-weight: 500; box-shadow: 0 1px 2px rgba(0,0,0,.08); }
  .grants-meta { display: flex; align-items: center; justify-content: space-between; font-size: 11px; color: var(--text-light); margin-top: 8px; }
  .grants-meta a { color: var(--primary); cursor: pointer; }
  .grants-meta .div { color: #e5e7eb; }
  .grants-list { flex: 1; overflow-y: auto; padding: 8px 0; }
  .grp-head { display: flex; align-items: center; gap: 8px; padding: 4px 8px; margin-bottom: 4px; border-radius: 6px; }
  .grp-head:hover { background: #fafafa; }
  .grp-head .grp-name { display: flex; align-items: center; gap: 6px; font-size: 11px; font-weight: 500; color: var(--text-light); text-transform: uppercase; letter-spacing: .04em; }
  .grp-head .grp-count { font-size: 11px; color: var(--text-lighter); }
  .inst-row { display: flex; align-items: center; gap: 10px; padding: 8px 10px; border: 1px solid #f3f4f6; border-radius: 8px; cursor: pointer; margin-bottom: 4px; transition: all .12s; }
  .inst-row:hover { background: #fafafa; }
  .inst-row.checked { border-color: rgba(0,122,255,.35); background: rgba(0,122,255,.04); }
  .inst-row .ir-main { flex: 1; min-width: 0; }
  .inst-row .ir-name { font-size: 13px; color: var(--text); }
  .inst-row .ir-owner { font-size: 11px; color: var(--text-lighter); }
  .inst-row .ir-badge { font-size: 10px; padding: 1px 6px; border-radius: 999px; flex-shrink: 0; }
  .ir-badge.run { background: var(--green-bg); color: var(--green-text); }
  .ir-badge.stop { background: var(--gray-bg); color: var(--gray-text); }
  .ir-badge.share { background: var(--blue-bg); color: var(--blue); margin-left: 6px; font-size: 9px; padding: 1px 5px; border-radius: 4px; }
  .cb { width: 15px; height: 15px; accent-color: var(--primary); cursor: pointer; flex-shrink: 0; }

  /* ============ 部门级授权抽屉 ============ */
  .dept-tree { padding: 4px 0; }
  .shared-group { margin-bottom: 12px; padding-bottom: 8px; border-bottom: 1px dashed var(--border); }
  .shared-group .sg-head { display: flex; align-items: center; gap: 6px; font-size: 11px; font-weight: 500; color: var(--text-light); text-transform: uppercase; letter-spacing: .04em; padding: 4px 8px; }
  .shared-group .sg-tip { font-size: 10px; color: var(--text-lighter); padding: 0 8px; margin-bottom: 4px; }
  .dept-node-row { display: flex; align-items: center; gap: 6px; padding: 6px 8px; border-radius: 6px; }
  .dept-node-row:hover { background: #fafafa; }
  .dept-node-row .exp { padding: 2px; color: var(--text-lighter); cursor: pointer; border: none; background: transparent; font-size: 14px; display: flex; }
  .dept-node-row .exp-spacer { width: 18px; flex-shrink: 0; }
  .dept-node-row .dn-name { font-size: 13px; color: var(--text); flex: 1; }
  .dept-node-row .dn-count { font-size: 10px; color: var(--text-lighter); }
  .dept-check { width: 14px; height: 14px; border-radius: 3px; flex-shrink: 0; cursor: pointer; display: inline-flex; align-items: center; justify-content: center; border: none; background: transparent; padding: 0; }
  .dc-none { border: 1.5px solid #d1d5db; background: var(--card); }
  .dc-all { background: var(--primary); }
  .dc-some { background: var(--amber); }
  .dept-tag { font-size: 9px; padding: 1px 6px; border-radius: 999px; flex-shrink: 0; }
  .dept-tag.all { background: rgba(0,122,255,.1); color: var(--primary); }
  .dept-tag.some { background: var(--amber-bg); color: var(--amber-text); }

  .member-layer { margin-left: 4px; border-left: 1px solid #f3f4f6; padding-left: 4px; }
  .user-row { display: flex; align-items: center; gap: 8px; padding: 4px 8px; border-radius: 6px; }
  .user-row:hover { background: #fafafa; }
  .user-row.locked { opacity: .7; }
  .user-row.ugranted { background: rgba(20,184,166,.06); }
  .user-row .ur-name { font-size: 13px; color: var(--text); }
  .user-row .ur-count { font-size: 10px; color: var(--text-lighter); }
  .user-row .ur-tag { font-size: 9px; padding: 1px 6px; border-radius: 999px; }
  .user-row .ur-tag.inherit { background: rgba(0,122,255,.1); color: var(--primary); }
  .user-row .ur-tag.ulevel { background: var(--teal-bg); color: var(--teal-text); }
  .inst-sub-row { display: flex; align-items: center; gap: 8px; padding: 4px 8px; border-radius: 6px; }
  .inst-sub-row:hover { background: #fafafa; }
  .inst-sub-row.locked { opacity: .7; }
  .inst-sub-row .isr-name { font-size: 12px; color: var(--text-light); flex: 1; }
  .src-label { display: inline-flex; align-items: center; gap: 2px; font-size: 9px; padding: 1px 5px; border-radius: 4px; }
  .src-label.dept { background: rgba(0,122,255,.1); color: var(--primary); }
  .src-label.user { background: var(--teal-bg); color: var(--teal-text); }
  .state-badge { font-size: 9px; padding: 1px 6px; border-radius: 999px; flex-shrink: 0; }

  /* ============ 确认弹窗 ============ */
  .modal-mask { position: fixed; inset: 0; background: rgba(0,0,0,.4); display: none; align-items: center; justify-content: center; z-index: 70; }
  .modal-mask.show { display: flex; }
  .modal { background: var(--card); border-radius: 14px; padding: 22px; width: 380px; max-width: 90vw; box-shadow: 0 20px 60px rgba(0,0,0,.2); }
  .modal h3 { font-size: 15px; font-weight: 600; margin-bottom: 10px; display: flex; align-items: center; gap: 8px; }
  .modal h3.danger { color: var(--red); }
  .modal p { font-size: 13px; color: var(--text-light); margin-bottom: 18px; }
  .modal .actions { display: flex; justify-content: flex-end; gap: 8px; }

  /* ============ Toast ============ */
  .toast-wrap { position: fixed; bottom: 28px; left: 50%; transform: translateX(-50%); z-index: 90; display: flex; flex-direction: column; gap: 8px; align-items: center; }

  function foModels() {

    var m = foModels().find(function (x) { return String(x.id) === String(id); });

  function renderFailover() {
    var usingMock = S.models.length === 0;
    var editing = S.failoverEditing;
    var rule = S.failover;
    var models = foModels();
    var html = '<div class="failover">';

    // 头

    html += '<h3>故障转移</h3>';

    html += '</div>';
    if (!editing) {
      html += '<button class="btn btn-sm" data-action="fo-edit">' + icon('i-edit', 12) + (rule ? '编辑' : '配置规则') + '</button>';
    }
    html += '</div>';

        html += '<div class="fo-row"><span class="lbl">主模型</span><b style="font-weight:500">' + esc(foModelName(rule.primaryModelId)) + '</b></div>';

        if (fbs.length === 0) {
          html += '<span class="fo-empty-tip">未配置，故障转移不会生效</span>';

          html += '<span class="fo-chain">' + fbs.map(function (f) { return esc(foModelName(f)); }).join('、') + '</span>';
        } else {
          html += '<span class="fo-chain">' + fbs.map(function (f, i) { return (i + 1) + '.' + esc(foModelName(f)); }).join(' → ') + '</span>';
        }
        html += '</div>';
      } else {
        html += '<div class="fo-none">尚未配置故障转移。主模型异常时调用将直接失败。</div>';
      }
    } else {
      // 编辑态
      var f = S.failoverForm;
      html += '<div class="fo-edit" id="fo-edit-body">';
      html += failoverEditBody(f, models);
      html += '</div>';
    }

    html += '</div>';
    return html;

  function failoverEditBody(f, models) {
    var html = '';
    // 主模型
    html += '<div class="field"><label>主模型 <span style="color:var(--red)">*</span></label>';
    html += '<select data-on="fo-primary" class="' + (f.errPrimary ? 'err' : '') + '">';
    html += '<option value="">请选择主模型</option>';
    models.forEach(function (m) {
      html += '<option value="' + esc(m.id) + '"' + (String(f.primaryModelId) === String(m.id) ? ' selected' : '') + '>' + esc(m.displayName || m.name) + '</option>';
    });
    html += '</select>';
    if (f.errPrimary) html += '<div class="err-msg">请选择主模型</div>';
    html += '</div>';

    // 切换策略
    html += '<div class="field"><label>切换策略</label>';
    html += '<select data-on="fo-strategy">';
    html += '<option value="ordered"' + (f.strategy === 'ordered' ? ' selected' : '') + '>指定顺序（按优先级依次切换）</option>';
    html += '<option value="random"' + (f.strategy === 'random' ? ' selected' : '') + '>随机切换（随机选择一个可用备用模型）</option>';
    html += '</select></div>';

    // 备用模型
    html += '<div class="field"><label>备用模型<span class="hint">' + (f.strategy === 'ordered' ? '（已选可调整优先级）' : '（已选将随机切换）') + '</span></label>';

    // 已选区
    if (f.fallbackModelIds.length > 0) {
      html += '<div class="fo-selected">';
      f.fallbackModelIds.forEach(function (fid, idx) {
        var draggable = f.strategy === 'ordered';
        html += '<div class="fo-sel-item ' + (draggable ? 'draggable' : '') + '"' +
          (draggable ? ' draggable="true" data-fo-idx="' + idx + '"' : '') + '>';
        if (draggable) {
          html += icon('i-drag', 14);
          html += '<span class="ord mono">' + (idx + 1) + '</span>';
        }
        html += '<span style="flex:1">' + esc(foModelName(fid)) + '</span>';
        html += '<button class="rm" data-action="fo-remove" data-id="' + esc(fid) + '" title="移除">' + icon('i-close', 14) + '</button>';
        html += '</div>';
      });
      html += '</div>';
    } else {
      html += '<p style="font-size:11px;color:var(--text-lighter);margin-bottom:8px">尚未选择备用模型</p>';
    }

    // 候选区
    var candidates = models.filter(function (m) {
      return String(m.id) !== String(f.primaryModelId) && !f.fallbackModelIds.some(function (x) { return String(x) === String(m.id); });
    });
    if (candidates.length === 0) {
      html += '<p style="font-size:11px;color:var(--text-lighter)">无可添加的备用模型</p>';
    } else {
      candidates.forEach(function (m) {
        html += '<label class="fo-cand"><input type="checkbox" data-action="fo-add" data-id="' + esc(m.id) + '">' + esc(m.displayName || m.name) + '</label>';
      });
    }
    html += '</div>';

    // 操作
    html += '<div style="display:flex;gap:8px;padding-top:4px">';
    html += '<button class="btn btn-primary btn-sm" data-action="fo-save">' + (S._foSaving ? '保存中...' : '保存') + '</button>';
    html += '<button class="btn btn-sm" data-action="fo-cancel">取消</button>';
    html += '</div>';
    return html;
  }

  function renderDeptGrants(g) {
    var h = '';

    h += '<div class="search-box">' + icon('i-search', 14) + '<input type="text" value="' + esc(g.keyword) + '" placeholder="搜索部门 / 员工" data-on-input="dept-search"></div>';

    // 列表

    h += '<div style="display:flex;justify-content:flex-end;gap:8px"><button class="btn btn-sm" data-action="grant-close">取消</button><button class="btn btn-primary btn-sm" data-action="dept-save"' + (g.saving ? ' disabled' : '') + '>' + (g.saving ? '保存中...' : '保存授权') + '</button></div>';

  }
  function deptTreeHtml(g) {
    var kw = (g.keyword || '').trim().toLowerCase();
    var matched = null;
    if (kw) {
      matched = {};
      MOCK_DEPTS.forEach(function (d) {
        if (d.name.toLowerCase().indexOf(kw) >= 0) {
          deptSubtreeIds(MOCK_DEPTS, d.id).forEach(function (id) { matched[id] = true; });
          if (d.parentId) matched[d.parentId] = true;
        }
      });
      MOCK_INSTANCES.forEach(function (i) {
        if (i.name.toLowerCase().indexOf(kw) >= 0 || (i.ownerName || '').toLowerCase().indexOf(kw) >= 0) {
          if (i.departmentId) { matched[i.departmentId] = true; ancestors(MOCK_DEPTS, i.departmentId).forEach(function (a) { matched[a] = true; }); }
        }
      });
    }
    var h = '';
    // 组织共享 Agent（独立分组）
    var shared = MOCK_INSTANCES.filter(function (i) { return isSharedInstance(i.ownerName); });
    if (shared.length > 0) {
      h += '<div class="shared-group">';
      h += '<div class="sg-head">' + icon('i-domain', 12) + '组织共享 Agent</div>';
      h += '<div class="sg-tip">组织级资源，单独授权，不归属任何部门</div>';
      shared.forEach(function (inst) { h += deptInstanceRow(inst, 8, g); });
      h += '</div>';
    }
    // 部门树
    var co = childrenOf(MOCK_DEPTS);
    var roots = MOCK_DEPTS.filter(function (d) { return !d.parentId; });
    roots.forEach(function (r) { h += renderDeptNode(r, 0, co, g, matched, kw); });
    return h;
  }
  function renderDeptNode(dept, depth, co, g, matched, kw) {
    if (matched && !matched[dept.id]) return '';
    var kids = co[dept.id] || [];
    var instancesByDept = {};
    MOCK_INSTANCES.forEach(function (i) { if (!isSharedInstance(i.ownerName)) { var k = i.departmentId || '__none__'; (instancesByDept[k] = instancesByDept[k] || []).push(i); } });
    var insts = instancesByDept[dept.id] || [];
    var state = deptCascadeState(dept.id, g.selection, MOCK_DEPTS);
    var isOpen = !!kw || g.expanded.has(dept.id);
    var granted = resolveGrantedInstanceIds(g.selection, MOCK_DEPTS, MOCK_INSTANCES);
    var instGrantedHere = insts.filter(function (i) { return granted.has(i.id); }).length;

    var h = '<div>';
    h += '<div class="dept-node-row" style="padding-left:' + (depth * 16 + 4) + 'px">';
    if (kids.length > 0) {
      h += '<button class="exp" data-action="dept-expand" data-id="' + dept.id + '">' + icon(isOpen ? 'i-expand' : 'i-chevron', 14) + '</button>';
    } else {
      h += '<span class="exp-spacer"></span>';
    }
    h += deptCheckHtml(state, dept.id);
    h += icon('i-groups', 13) + '<span class="dn-name">' + esc(dept.name) + '</span>';
    h += '<span class="dn-count">' + instGrantedHere + '/' + insts.length + '</span>';
    if (state !== 'none') {
      h += '<span class="dept-tag ' + state + '" title="' + (state === 'all' ? '本部门及所有下属已全选' : '部分下属已选') + '">' + (state === 'all' ? '全选' : '部分') + '</span>';
    }
    h += '</div>';
    if (isOpen) {
      var showMembers = g.showMembers || !!kw;
      if (showMembers) h += memberLayerHtml(dept.id, (depth + 1) * 16 + 8, g);
      kids.forEach(function (k) { h += renderDeptNode(k, depth + 1, co, g, matched, kw); });
    }
    h += '</div>';
    return h;
  }
  function deptCheckHtml(state, id) {
    var inner = '';
    if (state === 'none') inner = ''; // 空框
    else if (state === 'all') inner = icon('i-check', 11);
    else inner = '<span style="width:6px;height:3px;background:#fff;border-radius:999px;display:block"></span>';
    return '<button class="dept-check dc-' + state + '" data-action="dept-toggle" data-id="' + id + '" title="' + (state === 'all' ? '本部门及所有下属已全选，点击清空' : state === 'some' ? '部分下属已选，点击全选' : '未授权，点击全选本部门及下属') + '">' + inner + '</button>';
  }
  // 成员层：部门下用户节点 + 其名下 instance
  function memberLayerHtml(deptId, depthPx, g) {
    var insts = MOCK_INSTANCES.filter(function (i) { return !isSharedInstance(i.ownerName) && i.departmentId === deptId; });
    if (insts.length === 0) return '';
    // 按用户归类
    var umap = {};
    insts.forEach(function (i) { var o = i.ownerName || '未指定'; (umap[o] = umap[o] || []).push(i); });
    var users = Object.keys(umap).sort(function (a, b) { return a.localeCompare(b, 'zh'); });
    var h = '';
    var granted = resolveGrantedInstanceIds(g.selection, MOCK_DEPTS, MOCK_INSTANCES);
    users.forEach(function (userName) {
      var userInsts = umap[userName];
      var src = userGrantSource(userName, deptId, g.selection);
      var inherited = src === 'dept';
      var userGranted = src !== 'none';
      var cnt = userInsts.filter(function (i) { return granted.has(i.id); }).length;
      h += '<div class="member-layer">';
      h += '<label class="user-row ' + (inherited ? 'locked' : userGranted ? 'ugranted' : '') + '" style="padding-left:' + depthPx + 'px"' + (inherited ? ' title="继承自部门授权，不可单独取消（请到部门节点取消）"' : '') + '>';
      h += '<input type="checkbox" class="cb" style="accent-color:var(--teal)" data-action="dept-user-toggle" data-name="' + esc(userName) + '" data-dept="' + deptId + '"' + (userGranted ? ' checked' : '') + (inherited ? ' disabled' : '') + '>';
      h += icon('i-person', 12) + '<span class="ur-name">' + esc(userName) + '</span><span class="ur-count">' + cnt + '/' + userInsts.length + '</span>';
      if (userGranted) h += '<span class="ur-tag ' + (inherited ? 'inherit' : 'ulevel') + '">' + (inherited ? '继承自部门' : '用户级') + '</span>';
      h += '</label>';
      userInsts.forEach(function (inst) { h += deptInstanceRow(inst, depthPx + 14, g); });
      h += '</div>';
    });
    return h;
  }
  // 单个 instance 行（共享分组 / 成员层共用）
  function deptInstanceRow(inst, depthPx, g) {
    var src = instanceGrantSource(inst.id, inst.departmentId, inst.ownerName, g.selection, MOCK_DEPTS);
    var from = instanceAuthLabel(inst.departmentId, inst.ownerName, g.selection, MOCK_DEPTS);
    var granted = resolveGrantedInstanceIds(g.selection, MOCK_DEPTS, MOCK_INSTANCES).has(inst.id);
    var locked = src === 'dept' || src === 'user';
    var fromLabel = from ? (from.kind === 'user' ? '继承自用户 ' + from.name : '来自 ' + from.name) : null;
    var h = '<label class="inst-sub-row ' + (locked ? 'locked' : '') + '" style="padding-left:' + depthPx + 'px"' + (locked ? ' title="' + esc(fromLabel) + '，不可单独取消"' : '') + '>';
    h += '<input type="checkbox" class="cb" style="width:12px;height:12px" data-action="dept-inst-toggle" data-id="' + inst.id + '" data-dept="' + esc(inst.departmentId || '') + '" data-owner="' + esc(inst.ownerName || '') + '"' + (granted ? ' checked' : '') + (locked ? ' disabled' : '') + '>';
    h += '<span class="isr-name">' + esc(inst.name) + '</span>';
    if (fromLabel) h += '<span class="src-label ' + (from.kind === 'user' ? 'user' : 'dept') + '">' + icon('i-spark', 9) + esc(from.name) + '</span>';
    h += '<span class="state-badge ' + (inst.state === 'running' ? 'ir-badge run' : 'ir-badge stop') + '">' + (inst.state === 'running' ? '运行' : '停止') + '</span>';
    h += '</label>';
    return h;
  }
  function refreshDeptTree() {

  /* ============ 11. 业务操作 ============ */
  function recomputeGrantsCount() {
    // 模型卡片授权计数：基于部门级授权 deptSelection 展开（部门/成员/实例三维命中）
    var counts = {};

      counts[mid] = resolveGrantedInstanceIds(S.deptSelection[mid], MOCK_DEPTS, MOCK_INSTANCES).size;

  function openEditor(id) {
    var model = id ? S.models.find(function (m) { return String(m.id) === String(id); }) : null;
    var form;
    if (model) {
      form = {
        displayName: String(model.displayName || model.name || ''),
        modelName: String(model.modelName || ''),
        description: String(model.description || ''),
        providerType: String(model.providerType || 'anthropic'),
        protocolType: String(model.protocolType || 'openai'),
        baseUrl: String(model.baseUrl || ''),
        providerModelName: String(model.providerModelName || ''),
        apiKey: '',
        maxTokens: model.maxTokens != null ? String(model.maxTokens) : '',
        timeout: model.timeout != null ? String(model.timeout) : '',
        streamTimeout: model.streamTimeout != null ? String(model.streamTimeout) : '',
        rateLimitPerMin: model.rateLimitPerMin != null ? String(model.rateLimitPerMin) : '60',
        inputPrice: String(model.inputPrice != null ? model.inputPrice : '0'),
        outputPrice: String(model.outputPrice != null ? model.outputPrice : '0'),

        cacheCreationCost: model.cacheCreationCost != null ? String(model.cacheCreationCost) : '',
        currency: String(model.currency || 'USD'),
        isActive: model.isActive !== false
      };
    } else {
      form = { displayName: '', modelName: '', description: '', providerType: 'anthropic', protocolType: 'anthropic', baseUrl: '', providerModelName: '', apiKey: '', maxTokens: '', timeout: '', streamTimeout: '', rateLimitPerMin: '60', inputPrice: '0', outputPrice: '0', cacheReadCost: '', cacheCreationCost: '', currency: 'USD', isActive: true };
    }
    S.editor = { model: model, form: form, errors: {}, saving: false };
    renderOverlay();
  }
  function editorValidate() {
    var f = S.editor.form; var e = {}; var isEdit = !!S.editor.model;
    if (!f.displayName.trim()) e.displayName = '请输入显示名称';
    if (!f.providerModelName.trim()) e.providerModelName = '请输入供应商模型名';
    if (!f.baseUrl.trim()) e.baseUrl = '请输入 Base URL';
    if (!isEdit && !f.apiKey.trim()) e.apiKey = '新建模型时请输入 API Key';
    if (f.maxTokens && Number(f.maxTokens) <= 0) e.maxTokens = '必须为正整数';
    if (f.timeout && Number(f.timeout) <= 0) e.timeout = '必须为正整数';
    if (f.streamTimeout && Number(f.streamTimeout) <= 0) e.streamTimeout = '必须为正整数';
    if (f.rateLimitPerMin && Number(f.rateLimitPerMin) <= 0) e.rateLimitPerMin = '必须为正整数';
    if (f.inputPrice && Number(f.inputPrice) < 0) e.inputPrice = '不能为负数';
    if (f.outputPrice && Number(f.outputPrice) < 0) e.outputPrice = '不能为负数';
    S.editor.errors = e;
    return Object.keys(e).length === 0;
  }
  function editorSave() {
    if (!editorValidate()) { renderOverlay(); return; }
    var f = S.editor.form; var isEdit = !!S.editor.model;
    var payload = {
      displayName: f.displayName, modelName: f.modelName, description: f.description,
      providerType: f.providerType, protocolType: f.protocolType, baseUrl: f.baseUrl,
      providerModelName: f.providerModelName,
      maxTokens: f.maxTokens ? Number(f.maxTokens) : undefined,
      timeout: f.timeout ? Number(f.timeout) : undefined,
      streamTimeout: f.streamTimeout ? Number(f.streamTimeout) : undefined,
      rateLimitPerMin: f.rateLimitPerMin ? Number(f.rateLimitPerMin) : undefined,
      inputPrice: Number(f.inputPrice) || 0, outputPrice: Number(f.outputPrice) || 0,
      cacheReadCost: f.cacheReadCost ? Number(f.cacheReadCost) : undefined,
      cacheCreationCost: f.cacheCreationCost ? Number(f.cacheCreationCost) : undefined,
      currency: f.currency, isActive: f.isActive
    };
    if (isEdit) {
      var m = Object.assign({}, S.editor.model, payload);
      if (!f.apiKey) { /* 编辑留空不更新 key */ }
      var idx = S.models.findIndex(function (x) { return String(x.id) === String(S.editor.model.id); });
      S.models[idx] = m;
      toast('模型已更新', 'success');
    } else {
      var newId = String(Date.now()).slice(-6);
      S.models.push(Object.assign({ id: newId, healthStatus: 'unknown' }, payload));
      toast('模型已创建', 'success');
    }
    S.editor = null;
    renderOverlay();
    renderApp();
  }

  function openGrants(id) {
    var m = S.models.find(function (x) { return String(x.id) === String(id); });
    var name = m ? (m.displayName || m.name) : id;
    var sel = S.deptSelection[id] ? { depts: new Set(S.deptSelection[id].depts), users: new Set(S.deptSelection[id].users), instances: new Set(S.deptSelection[id].instances) } : emptySel();
    S.grantDrawer = { type: 'dept', modelId: id, modelName: name, keyword: '', selection: sel, showMembers: false, expanded: new Set(['dept-root']), saving: false };
    renderOverlay();
  }
  function openAgentGrantsEmbedded(id) {
    // 编辑器内嵌：统一部门级授权面板
    openGrants(id);
  }

  function healthCheck(id) {
    S.checkingHealth = id;
    renderApp();
    setTimeout(function () {
      var m = S.models.find(function (x) { return String(x.id) === String(id); });
      var status = String(m.healthStatus);
      m.lastHealthCheckAt = new Date().toISOString();
      // 静态探测：保持原状态，刷新延迟与检测时间（原型无后端，不改变健康结论）
      S.healthLatency[id] = (status === 'unreachable' || status === 'unhealthy') ? undefined : 142;
      S.checkingHealth = null;
      var lat = S.healthLatency[id];
      if (status === 'healthy') toast('健康检查完成：正常' + (lat != null ? '（' + lat + 'ms）' : ''), 'success');
      else if (status === 'degraded') toast('健康检查完成：降级' + (lat != null ? '（' + lat + 'ms）' : ''), 'info');
      else if (status === 'unconfigured') toast('健康检查失败：模型未配置 baseUrl', 'error');
      else toast('健康检查失败：无法连接', 'error');
      renderApp();
    }, 700);
  }

  function toggleModel(id) {
    var m = S.models.find(function (x) { return String(x.id) === String(id); });
    if (m) { m.isActive = !m.isActive; renderApp(); }
  }

  function deleteModel(id) {
    S.confirm = { title: '删除模型', message: '确定要删除该模型配置吗？', danger: true, loading: false };
    renderOverlay();
    // 记录待删除 id
    S._pendingDelete = id;
  }

  /* ============ 12. 事件处理 ============ */
  document.addEventListener('click', function (e) {
    var t = e.target.closest('[data-action]');
    if (!t) return;
    var action = t.getAttribute('data-action');
    var id = t.getAttribute('data-id');
    var mid;

    switch (action) {
      case 'set-tab': S.tab = t.getAttribute('data-tab'); renderApp(); break;
      case 'date-this-week': var w = computeThisWeekRange(); S.dateFrom = w.from; S.dateTo = w.to; renderApp(); break;
      case 'date-recent-7': var r7 = recentDays(7); S.dateFrom = r7.from; S.dateTo = r7.to; renderApp(); break;
      case 'date-recent-30': var r30 = recentDays(30); S.dateFrom = r30.from; S.dateTo = r30.to; renderApp(); break;
      case 'date-all': S.dateFrom = ''; S.dateTo = ''; renderApp(); break;
      case 'open-editor': openEditor(id); break;
      case 'editor-close': S.editor = null; renderOverlay(); break;
      case 'editor-save': editorSave(); break;
      case 'editor-open-grants':
        if (S.editor && S.editor.model) openAgentGrantsEmbedded(String(S.editor.model.id));
        break;
      case 'editor-active': S.editor.form.isActive = !S.editor.form.isActive; renderOverlay(); break;

      case 'toggle-model': toggleModel(id); break;
      case 'health-check': healthCheck(id); break;
      case 'delete-model': deleteModel(id); break;
      case 'open-grants': openGrants(id); break;

      case 'grant-close': S.grantDrawer = null; renderOverlay(); break;

      // 部门级授权
      case 'dept-show-members':
        S.grantDrawer.showMembers = !S.grantDrawer.showMembers;
        if (S.grantDrawer.showMembers) S.grantDrawer.expanded = new Set(MOCK_DEPTS.map(function (d) { return d.id; }));
        renderOverlay(); break;
      case 'dept-toggle':
        S.grantDrawer.selection = toggleDeptCascade(id, S.grantDrawer.selection, MOCK_DEPTS);
        refreshDeptTree(); refreshDeptFooter(); break;
      case 'dept-expand':
        if (S.grantDrawer.expanded.has(id)) S.grantDrawer.expanded.delete(id); else S.grantDrawer.expanded.add(id);
        refreshDeptTree(); break;
      case 'dept-user-toggle': {
        var uname = t.getAttribute('data-name'); var udept = t.getAttribute('data-dept');
        if (userGrantSource(uname, udept, S.grantDrawer.selection) === 'dept') break;
        if (S.grantDrawer.selection.users.has(uname)) S.grantDrawer.selection.users.delete(uname); else S.grantDrawer.selection.users.add(uname);
        refreshDeptTree(); refreshDeptFooter(); break;
      }
      case 'dept-inst-toggle': {
        var iid = t.getAttribute('data-id'); var idept = t.getAttribute('data-dept') || null; var iowner = t.getAttribute('data-owner') || null;
        var isrc = instanceGrantSource(iid, idept, iowner, S.grantDrawer.selection, MOCK_DEPTS);
        if (isrc === 'dept' || isrc === 'user') break;
        if (S.grantDrawer.selection.instances.has(iid)) S.grantDrawer.selection.instances.delete(iid); else S.grantDrawer.selection.instances.add(iid);
        refreshDeptTree(); refreshDeptFooter(); break;
      }
      case 'dept-clear':
        S.grantDrawer.selection = emptySel();
        refreshDeptTree(); refreshDeptFooter(); break;
      case 'dept-save':
        S.grantDrawer.saving = true; renderOverlay();
        setTimeout(function () {
          var n = resolveGrantedInstanceIds(S.grantDrawer.selection, MOCK_DEPTS, MOCK_INSTANCES).size;
          S.deptSelection[S.grantDrawer.modelId] = { depts: new Set(S.grantDrawer.selection.depts), users: new Set(S.grantDrawer.selection.users), instances: new Set(S.grantDrawer.selection.instances) };
          toast('已保存授权：' + n + ' 人可用', 'success');
          S.grantDrawer = null; renderOverlay(); recomputeGrantsCount(); renderApp();
        }, 350);
        break;

      // 故障转移
      case 'fo-edit':
        S.failoverEditing = true;
        S.failoverForm = S.failover ? { primaryModelId: S.failover.primaryModelId, strategy: S.failover.strategy, fallbackModelIds: (S.failover.fallbackModelIds || []).slice(), errPrimary: false } : { primaryModelId: foModels()[0] ? String(foModels()[0].id) : '', strategy: 'ordered', fallbackModelIds: [], errPrimary: false };
        renderApp(); break;
      case 'fo-cancel': S.failoverEditing = false; S.failoverForm = null; renderApp(); break;
      case 'fo-add': {
        var fid = t.getAttribute('data-id');
        if (S.failoverForm.fallbackModelIds.indexOf(fid) < 0) S.failoverForm.fallbackModelIds.push(fid);
        refreshFailoverBody(); break;
      }
      case 'fo-remove': {
        var rid = t.getAttribute('data-id');
        S.failoverForm.fallbackModelIds = S.failoverForm.fallbackModelIds.filter(function (x) { return x !== rid; });
        refreshFailoverBody(); break;
      }
      case 'fo-save':
        if (!S.failoverForm.primaryModelId) { S.failoverForm.errPrimary = true; refreshFailoverBody(); break; }
        S.failover = { id: S.failover ? S.failover.id : ('fo-' + Date.now()), primaryModelId: S.failoverForm.primaryModelId, strategy: S.failoverForm.strategy, fallbackModelIds: S.failoverForm.fallbackModelIds.slice(), enabled: true };
        S.failoverEditing = false; S.failoverForm = null;
        toast('故障转移规则已保存', 'success'); renderApp(); break;

      // 确认弹窗
      case 'confirm-cancel': S.confirm = null; S._pendingDelete = null; renderOverlay(); break;
      case 'confirm-ok':
        if (S.confirm.danger && S._pendingDelete != null) {
          S.confirm.loading = true; renderOverlay();
          setTimeout(function () {
            S.models = S.models.filter(function (x) { return String(x.id) !== String(S._pendingDelete); });
            delete S.grantsCount[S._pendingDelete];
            toast('模型已删除', 'success');
            S.confirm = null; S._pendingDelete = null; renderOverlay(); renderApp();
          }, 400);
        }
        break;

      case 'overlay-close':
        // 点遮罩关闭抽屉（保存中不关）
        if (S.editor && !S.editor.saving) { S.editor = null; }
        if (S.grantDrawer && !S.grantDrawer.saving) { S.grantDrawer = null; }
        renderOverlay(); break;
    }
  });

  // change 事件（select / date / textarea）
  document.addEventListener('change', function (e) {
    var t = e.target.closest('[data-on]');
    if (!t) return;
    var on = t.getAttribute('data-on');
    var key = t.getAttribute('data-key');
    var val = t.value;

    if (on === 'date-from') { S.dateFrom = val; return; }
    if (on === 'date-to') { S.dateTo = val; return; }

    // 故障转移
    if (on === 'fo-primary' && S.failoverForm) { S.failoverForm.primaryModelId = val; S.failoverForm.errPrimary = false; refreshFailoverBody(); return; }
    if (on === 'fo-strategy' && S.failoverForm) { S.failoverForm.strategy = val; refreshFailoverBody(); return; }
  });

  // input 事件：搜索框实时刷新列表 + 编辑器表单实时入内存（避免失焦/丢值）
  document.addEventListener('input', function (e) {
    var ti = e.target.closest('[data-on-input]');
    if (ti) {
      var oni = ti.getAttribute('data-on-input');
      if (oni === 'dept-search' && S.grantDrawer) { S.grantDrawer.keyword = ti.value; refreshDeptTree(); return; }
      return;
    }
    // 编辑器表单实时入内存（不重渲染，避免输入失焦；供应商联动除外）
    var to = e.target.closest('[data-on="editor-field"]');
    if (to && S.editor) {
      var key = to.getAttribute('data-key'); var val = to.value;
      S.editor.form[key] = val;
      if (key === 'providerType' && !S.editor.model) {
        var p = PROVIDERS.find(function (x) { return x.id === val; });
        if (p) { S.editor.form.baseUrl = p.baseUrl; S.editor.form.protocolType = p.protocolType; renderOverlay(); }
      }
    }
  });

  // 部门级授权抽屉底部计数局部刷新
  function refreshDeptFooter() {
    if (!S.grantDrawer || S.grantDrawer.type !== 'dept') return;
    var g = S.grantDrawer;
    var granted = resolveGrantedInstanceIds(g.selection, MOCK_DEPTS, MOCK_INSTANCES);
    var el = document.querySelector('.drawer.w-600 .drawer-foot .grants-meta span');
    if (el) el.innerHTML = '规则：' + g.selection.depts.size + ' 部门 + ' + g.selection.users.size + ' 用户 + ' + g.selection.instances.size + ' 单独 = <b style="color:var(--primary);font-weight:600">' + granted.size + '</b> 人可用';
  }

  // 故障转移拖拽（HTML5 DnD，仅 ordered）
  document.addEventListener('dragstart', function (e) {
    var item = e.target.closest('[data-fo-idx]');
    if (!item || !S.failoverForm || S.failoverForm.strategy !== 'ordered') return;
    S._foDragIdx = Number(item.getAttribute('data-fo-idx'));
    e.dataTransfer.effectAllowed = 'move';
    item.classList.add('dragging');
  });
  document.addEventListener('dragover', function (e) {
    var item = e.target.closest('[data-fo-idx]');
    if (!item || !S.failoverForm || S.failoverForm.strategy !== 'ordered') return;
    e.preventDefault(); e.dataTransfer.dropEffect = 'move';
    document.querySelectorAll('.fo-sel-item.drag-over').forEach(function (x) { x.classList.remove('drag-over'); });
    if (Number(item.getAttribute('data-fo-idx')) !== S._foDragIdx) item.classList.add('drag-over');
  });
  document.addEventListener('drop', function (e) {
    var item = e.target.closest('[data-fo-idx]');
    if (!item || !S.failoverForm) return;
    e.preventDefault();
    var from = S._foDragIdx; var to = Number(item.getAttribute('data-fo-idx'));
    document.querySelectorAll('.fo-sel-item').forEach(function (x) { x.classList.remove('drag-over'); x.classList.remove('dragging'); });
    if (from == null || from === to) return;
    var arr = S.failoverForm.fallbackModelIds.slice();
    var moved = arr.splice(from, 1)[0];
    arr.splice(to, 0, moved);
    S.failoverForm.fallbackModelIds = arr;
    refreshFailoverBody();
  });
  document.addEventListener('dragend', function () {
    document.querySelectorAll('.fo-sel-item').forEach(function (x) { x.classList.remove('drag-over'); x.classList.remove('dragging'); });
    S._foDragIdx = null;
  });

  /* ============ 13. 启动 ============ */
  recomputeGrantsCount();
  renderApp();
})();
</script>
</body>
</html>
