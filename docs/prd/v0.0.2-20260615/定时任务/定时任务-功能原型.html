<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>定时任务 · DCF 管理后台（功能原型）</title>
<style>
/* ============ 设计变量（对齐 Tailwind 配色） ============ */
:root{
  --primary:#007AFF; --primary-d:#0066d6;
  --primary-5:rgba(0,122,255,.05); --primary-10:rgba(0,122,255,.10);
  --success:#34C759; --error:#FF3B30; --warning:#FF9500; --indigo:#5856D6;
  --g50:#f9fafb; --g100:#f3f4f6; --g200:#e5e7eb; --g300:#d1d5db; --g400:#9ca3af; --g500:#6b7280; --g600:#4b5563; --g700:#374151; --g800:#1f2937; --g900:#111827;
  --bg:#f5f5f7;
  --purple50:#faf5ff; --purple600:#9333ea;
  --green50:#f0fdf4; --green500:#22c55e; --green600:#16a34a; --green700:#15803d;
  --red50:#fef2f2; --red500:#ef4444; --red700:#b91c1c; --red100:#fee2e2;
  --orange50:#fff7ed; --orange500:#f97316; --orange700:#c2410c;
  --blue50:#eff6ff; --blue500:#3b82f6; --blue700:#1d4ed8;
  --amber50:#fffbeb; --amber700:#b45309; --amber200:#fde68a;
}
*{box-sizing:border-box}
html,body{margin:0;padding:0}
body{background:var(--bg);color:var(--g800);font-family:-apple-system,BlinkMacSystemFont,"Segoe UI","PingFang SC","Microsoft YaHei",sans-serif;font-size:14px;line-height:1.5}
button{font-family:inherit;cursor:pointer;border:none;background:none;color:inherit}
input,select,textarea{font-family:inherit;font-size:14px;color:var(--g800)}
input:focus,select:focus,textarea:focus{outline:none}
a{color:inherit}
::-webkit-scrollbar{width:8px;height:8px}
::-webkit-scrollbar-thumb{background:var(--g300);border-radius:4px}
::-webkit-scrollbar-track{background:transparent}
.ic{display:inline-flex;vertical-align:middle;flex-shrink:0}

/* ============ 布局 ============ */
.app{display:flex;min-height:100vh}
.sidebar{display:none;width:224px;background:#fff;border-right:1px solid var(--g200);position:sticky;top:0;height:100vh;flex-shrink:0;overflow-y:auto}
@media(min-width:768px){.sidebar{display:block}}
.sb-brand{padding:16px;font-weight:600;color:var(--g900);display:flex;align-items:center;gap:8px}
.sb-brand .ic{color:var(--primary)}
.sb-nav{padding:0 8px 24px;font-size:14px}
.sb-group{padding:12px 8px 4px;font-size:10px;color:var(--g400);text-transform:uppercase;letter-spacing:.05em}
.sb-item{display:block;padding:6px 8px;border-radius:8px;color:var(--g600)}
.sb-item:hover{background:var(--g50)}
.sb-item.active{background:var(--primary-10);color:var(--primary);font-weight:500;display:flex;align-items:center;gap:8px}
.content{flex:1;min-width:0}

/* ============ 页面 ============ */
.page{padding:24px;display:flex;flex-direction:column;gap:16px}
.page-head{display:flex;align-items:center;justify-content:space-between;gap:12px;flex-wrap:wrap}
.page-title{font-size:18px;font-weight:600;color:var(--g800);margin:0}
.page-sub{font-size:12px;color:var(--g400);margin:2px 0 0}
.fade-in{animation:fadeIn .18s ease-out}
@keyframes fadeIn{from{opacity:0}to{opacity:1}}

/* ============ 按钮 ============ */
.btn{display:inline-flex;align-items:center;gap:6px;padding:6px 12px;border-radius:8px;font-size:14px;transition:background .15s,color .15s;color:var(--g700)}
.btn-primary{background:var(--primary);color:#fff}
.btn-primary:hover{background:var(--primary-d)}
.btn-sm{padding:4px 10px;font-size:12px;border-radius:8px}
.btn-ghost{color:var(--g500)}
.btn-ghost:hover{background:var(--g100)}
.btn-outline{border:1px solid var(--g200);color:var(--g700)}
.btn-outline:hover{background:var(--g50)}
.btn[disabled]{opacity:.4;pointer-events:none}

/* ============ 统计卡 ============ */
.stats{display:grid;grid-template-columns:repeat(2,1fr);gap:12px}
@media(min-width:1024px){.stats.lg4{grid-template-columns:repeat(4,1fr)}}
.stats.cols3{grid-template-columns:repeat(3,1fr)}
.stat-card{background:#fff;border:1px solid var(--g200);border-radius:12px;padding:12px;display:flex;align-items:center;gap:12px}
.stat-ic{font-size:22px;color:var(--g500)}
.stat-label{font-size:12px;color:var(--g400)}
.stat-value{font-size:18px;font-weight:600;color:var(--g800);word-break:break-all;line-height:1.3;margin-top:2px}

/* ============ 工具条 ============ */
.toolbar{display:flex;align-items:center;gap:8px;flex-wrap:wrap}
.toolbar .spacer{margin-left:auto}
.filter-btn{padding:4px 8px;font-size:12px;border-radius:8px;border:1px solid var(--g200);color:var(--g600);transition:.15s}
.filter-btn:hover{background:var(--g50)}
.filter-btn.active{border-color:var(--primary);color:var(--primary);background:var(--primary-5)}
.search-box{display:flex;align-items:center;gap:4px;padding:4px 8px;border:1px solid var(--g200);border-radius:8px;background:#fff;color:var(--g400)}
.search-box input{border:none;background:transparent;font-size:12px;width:160px}

/* ============ 列表/行 ============ */
.card{background:#fff;border:1px solid var(--g200);border-radius:12px;overflow:hidden}
.row{display:flex;align-items:center;padding:12px 16px;gap:12px}
.row:hover{background:var(--g50)}
.row+.row{border-top:1px solid var(--g100)}
.row-main{flex:1;min-width:0;cursor:pointer}
.row-titlewrap{display:flex;align-items:center;gap:8px;flex-wrap:wrap}
.row-title{font-size:14px;font-weight:500;color:var(--g900);overflow:hidden;text-overflow:ellipsis;white-space:nowrap;max-width:100%}
.row-main:hover .row-title{color:var(--primary)}
.row-meta{font-size:11px;color:var(--g400);margin-top:4px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;font-family:ui-monospace,SFMono-Regular,Menlo,monospace}
.row-actions{display:flex;align-items:center;gap:2px;flex-shrink:0}
.tag{padding:2px 6px;border-radius:4px;font-size:10px;display:inline-block;line-height:1.4}
.tag-agent{background:var(--purple50);color:var(--purple600)}
.tag-system{background:var(--g100);color:var(--g500)}
.tag-paused{background:var(--g100);color:var(--g400)}
.tag-enable{background:var(--green50);color:var(--green600)}
.row-status{font-size:10px}
.row-status.completed{color:var(--green600)}
.row-status.failed{color:var(--red500)}
.row-status.timeout{color:var(--orange500)}
.countdown{font-size:10px;color:var(--primary)}
.icon-btn{padding:6px;border-radius:8px;color:var(--g400);display:inline-flex;transition:.15s}
.icon-btn:hover{background:var(--g100);color:var(--g600)}
.icon-btn.danger{color:var(--red500)}
.icon-btn.danger:hover{background:var(--red50)}
.icon-btn[disabled]{opacity:.4;pointer-events:none}

/* ============ 空状态 ============ */
.empty{padding:48px 0;text-align:center}
.empty .ic{color:var(--g300)}
.empty-title{font-size:14px;color:var(--g500);margin-top:8px}
.empty-desc{font-size:12px;color:var(--g400);margin-top:4px}

/* ============ 详情 ============ */
.detail-head{display:flex;align-items:center;gap:12px;flex-wrap:wrap}
.back-link{display:flex;align-items:center;gap:4px;font-size:14px;color:var(--g500)}
.back-link:hover{color:var(--g700)}
.detail-titlewrap{flex:1;min-width:0}
.detail-actions{display:flex;align-items:center;gap:8px}
.avg{font-size:12px;color:var(--g400)}
.error-banner{font-size:12px;color:var(--red700);background:var(--red50);border:1px solid #fecaca;border-radius:8px;padding:8px 12px}

/* ============ 历史双栏 ============ */
.panel-head{padding:10px 16px;border-bottom:1px solid var(--g100);display:flex;align-items:center;gap:8px}
.panel-head .t{font-size:14px;font-weight:600;color:var(--g800)}
.split{display:grid;grid-template-columns:1fr}
@media(min-width:768px){.split.md-320{grid-template-columns:320px 1fr}}
.history-list{max-height:70vh;overflow-y:auto}
@media(min-width:768px){.history-list{border-right:1px solid var(--g100)}}
.history-item{display:block;width:100%;text-align:left;padding:10px 16px;border-bottom:1px solid var(--g50)}
.history-item:hover{background:var(--g50)}
.history-item.active{background:var(--primary-5)}
.hi-top{display:flex;align-items:center;gap:8px}
.dot{width:6px;height:6px;border-radius:50%;display:inline-block}
.hi-status{font-size:12px;color:var(--g700)}
.hi-trig{font-size:10px;color:var(--g400);margin-left:auto}
.hi-time{font-size:11px;color:var(--g400);margin-top:2px}
.run-detail-wrap{padding:16px;max-height:70vh;overflow-y:auto}

/* ============ 单次执行详情 ============ */
.rd{display:flex;flex-direction:column;gap:16px}
.rd-ctx{display:flex;align-items:center;gap:8px}
.rd-ctx .name{font-size:14px;font-weight:500;color:var(--g800);overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.status-bar{display:flex;align-items:center;gap:8px;padding:8px 12px;border-radius:8px;border:1px solid;font-size:14px;font-weight:600}
.status-bar .trig{margin-left:auto;font-size:12px;font-weight:400;opacity:.7}
.time-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:8px}
.time-cell{background:var(--g50);border-radius:8px;padding:8px}
.time-cell .l{font-size:12px;color:var(--g400)}
.time-cell .v{font-size:12px;color:var(--g700);margin-top:2px}
.sec-label{font-size:12px;font-weight:500;color:var(--g500);margin-bottom:4px;display:flex;align-items:center;gap:4px}
.conclusion{background:linear-gradient(135deg,var(--g50),var(--g100));border:1px solid var(--g100);border-radius:8px;padding:12px;font-size:14px;color:var(--g800);white-space:pre-wrap;word-break:break-word;line-height:1.6}
.report-box{background:#fff;border:1px solid var(--g100);border-radius:8px;padding:16px;font-size:14px}
.json-box{background:var(--g900);color:#f3f4f6;border-radius:8px;padding:12px;font-size:12px;white-space:pre-wrap;word-break:break-all;max-height:288px;overflow-y:auto;font-family:ui-monospace,SFMono-Regular,Menlo,monospace}
.error-box{background:var(--red50);border:1px solid #fecaca;border-radius:8px;padding:12px;font-size:12px;color:var(--red700);white-space:pre-wrap;word-break:break-all}
.meta-line{font-size:11px;color:var(--g400)}
.sb-completed{background:var(--green50);color:var(--green700);border-color:#bbf7d0}
.sb-failed{background:var(--red50);color:var(--red700);border-color:#fecaca}
.sb-timeout{background:var(--orange50);color:var(--orange700);border-color:#fed7aa}
.sb-running{background:var(--blue50);color:var(--blue700);border-color:#bfdbfe}
.sb-pending{background:var(--g50);color:var(--g600);border-color:var(--g200)}
.dot-completed{background:var(--green500)} .dot-failed{background:var(--red500)} .dot-timeout{background:var(--orange500)} .dot-running{background:var(--blue500)} .dot-pending{background:var(--g400)}

/* ============ 抽屉 ============ */
.mask{position:fixed;inset:0;background:rgba(0,0,0,.3);z-index:40}
.drawer{position:fixed;right:0;top:0;height:100vh;background:#fff;z-index:50;box-shadow:-8px 0 30px rgba(0,0,0,.15);display:flex;flex-direction:column;width:100%;animation:slidein .22s ease-out}
@media(min-width:768px){.drawer.w560{width:560px}}
@media(min-width:1024px){.drawer.w820{width:820px}}
@keyframes slidein{from{transform:translateX(100%)}to{transform:translateX(0)}}
.drawer-head{display:flex;align-items:center;justify-content:space-between;padding:12px 16px;border-bottom:1px solid var(--g100)}
.drawer-head .t{font-size:14px;font-weight:600}
.drawer-body{flex:1;overflow-y:auto;padding:16px;display:flex;flex-direction:column;gap:16px}
.drawer-foot{display:flex;justify-content:flex-end;gap:8px;padding:12px;border-top:1px solid var(--g100)}

/* ============ 表单字段 ============ */
.field{display:flex;flex-direction:column}
.field-label{font-size:12px;font-weight:500;color:var(--g500);margin-bottom:4px;display:flex;align-items:center;gap:4px;flex-wrap:wrap}
.field-label .req{color:var(--red500);font-weight:500}
.field-label .help{color:var(--g300);font-weight:400}
.input,.textarea,.select{width:100%;padding:8px 12px;font-size:14px;border:1px solid var(--g200);border-radius:8px;background:#fff;color:var(--g800)}
.input:focus,.textarea:focus,.select:focus,.tag-input:focus-within{border-color:var(--primary)}
.textarea{resize:vertical;font-family:inherit}
.input.mono,.textarea.mono{font-family:ui-monospace,SFMono-Regular,Menlo,monospace;font-size:12px}
.input.err,.textarea.err{border-color:#f87171}

/* ============ 模板卡 ============ */
.tpl-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:8px}
.tpl-card{text-align:left;padding:10px;border-radius:8px;border:1px solid var(--g200);display:flex;flex-direction:column;gap:4px;transition:.15s}
.tpl-card:hover{background:var(--g50)}
.tpl-card.active{border-color:var(--primary);background:var(--primary-5)}
.tc-top{display:flex;align-items:center;gap:6px}
.tc-name{font-size:14px;font-weight:500;color:var(--g800)}
.tc-desc{font-size:11px;color:var(--g400);overflow:hidden;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical}

/* ============ 提示条 ============ */
.notice{font-size:12px;border-radius:8px;padding:8px 12px;line-height:1.5}
.notice.warn{color:var(--amber700);background:var(--amber50);border:1px solid var(--amber200)}
.notice.info{color:var(--g500);background:var(--g50);border:1px solid var(--g100)}

/* ============ 频次选择器 ============ */
.freq-modes{display:flex;gap:6px;flex-wrap:wrap}
.freq-mode{padding:4px 10px;border-radius:8px;font-size:12px;background:var(--g100);color:var(--g600);transition:.15s}
.freq-mode.active{background:var(--primary);color:#fff}
.freq-body{display:flex;align-items:center;gap:8px;flex-wrap:wrap;font-size:12px;color:var(--g500)}
.freq-body .input{width:auto;padding:6px 8px}
.freq-body .w20{width:80px} .freq-body .w16{width:64px}
.cron-result{margin-top:6px;font-size:12px}
.cron-ok{color:var(--green600)} .cron-bad{color:var(--red500)}
.cron-next{margin-top:4px;font-size:11px;color:var(--g400)}
.freq-preview{font-size:11px;color:var(--g400);font-family:ui-monospace,SFMono-Regular,Menlo,monospace}

/* ============ 多选组 ============ */
.check-group{display:flex;flex-direction:column;gap:8px}
.cg-title{font-size:10px;font-weight:500;color:var(--g400);text-transform:uppercase;letter-spacing:.05em;margin-bottom:4px}
.check-row{display:flex;flex-wrap:wrap;gap:8px}
.check-btn{padding:4px 10px;border-radius:8px;font-size:12px;border:1px solid var(--g200);color:var(--g600);transition:.15s}
.check-btn:hover{background:var(--g50)}
.check-btn.active{border-color:var(--primary);color:var(--primary);background:var(--primary-5)}

/* ============ 标签输入 ============ */
.tag-input{display:flex;flex-wrap:wrap;gap:6px;padding:6px 8px;border:1px solid var(--g200);border-radius:8px}
.tag-input input{flex:1;min-width:120px;border:none;background:transparent;font-size:14px}
.tag-pill{display:inline-flex;align-items:center;gap:4px;padding:2px 8px;border-radius:4px;background:var(--primary-10);color:var(--primary);font-size:12px}
.tag-pill button{color:inherit;padding:0;line-height:1}
.tag-pill button:hover{color:var(--red500)}

/* ============ Markdown 编辑器 ============ */
.md-wrap{border:1px solid var(--g200);border-radius:8px;overflow:hidden}
.md-tabs{display:flex;align-items:center;gap:4px;padding:4px 8px;border-bottom:1px solid var(--g100);background:#fff}
.md-tab{padding:2px 8px;border-radius:4px;font-size:11px;color:var(--g500)}
.md-tab.active{background:var(--primary-10);color:var(--primary);font-weight:500}
.md-hint{margin-left:auto;font-size:10px;color:var(--g400)}
.md-editor{width:100%;padding:8px 12px;font-size:14px;font-family:ui-monospace,SFMono-Regular,Menlo,monospace;border:none;min-height:120px;resize:vertical}
.md-preview{padding:12px;font-size:14px;min-height:120px}

/* ============ 开关 ============ */
.toggle{display:inline-flex;align-items:center;gap:8px;font-size:14px;color:var(--g700);cursor:pointer;padding:4px 0}
.toggle input{width:16px;height:16px}

/* ============ Markdown 渲染 ============ */
.prose-md h1{font-size:1.2em;font-weight:700;margin:.6em 0 .3em}
.prose-md h2{font-size:1.08em;font-weight:600;margin:.55em 0 .3em}
.prose-md h3{font-size:1em;font-weight:600;margin:.5em 0 .25em}
.prose-md p{margin:.4em 0;line-height:1.6}
.prose-md ul{list-style:disc;padding-left:1.3em;margin:.4em 0}
.prose-md ol{list-style:decimal;padding-left:1.3em;margin:.4em 0}
.prose-md li{margin:.2em 0}
.prose-md table{border-collapse:collapse;margin:.5em 0;width:100%}
.prose-md th,.prose-md td{border:1px solid var(--g200);padding:4px 8px;font-size:.9em;text-align:left}
.prose-md th{background:var(--g50)}
.prose-md code{background:var(--g100);padding:1px 5px;border-radius:4px;font-size:.88em;font-family:ui-monospace,SFMono-Regular,Menlo,monospace}
.prose-md pre{background:var(--g900);color:#f3f4f6;padding:12px;border-radius:8px;overflow-x:auto}
.prose-md pre code{background:none;padding:0;color:inherit}
.prose-md strong{font-weight:600}
.prose-md em{font-style:italic}
.prose-md blockquote{border-left:3px solid var(--g300);padding-left:.8em;color:var(--g500);margin:.5em 0}
.prose-md hr{border:none;border-top:1px solid var(--g200);margin:.6em 0}
.prose-md a{color:var(--primary)}

/* ============ 原型标识 ============ */
.proto-banner{position:fixed;left:8px;bottom:8px;z-index:60;font-size:10px;color:var(--g400);background:rgba(255,255,255,.85);border:1px solid var(--g200);border-radius:8px;padding:4px 8px;box-shadow:0 1px 3px rgba(0,0,0,.05)}
.truncate{overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.err-text{font-size:12px;color:var(--red500)}
</style>
</head>
<body>

<div class="app">
  <!-- 侧栏（模拟 AdminShell） -->
  <aside class="sidebar">
    <div class="sb-brand"><span class="ic" data-icon="hub" data-size="22"></span> DCF</div>
    <nav class="sb-nav">
      <div class="sb-group">控制面</div>
      <a class="sb-item">概览</a>
      <a class="sb-item">数字员工</a>
      <a class="sb-item">组织与成员</a>
      <a class="sb-item">记忆库</a>
      <a class="sb-item">AI 网关</a>
      <div class="sb-group">自动化</div>
      <a class="sb-item active"><span class="ic" data-icon="schedule" data-size="18"></span>定时任务</a>
      <a class="sb-item">评测中心</a>
      <div class="sb-group">系统</div>
      <a class="sb-item">审计日志</a>
      <a class="sb-item">系统配置</a>
    </nav>
  </aside>
  <main class="content"><div id="content"></div></main>
</div>

<div id="drawer-root"></div>
<div class="proto-banner">🧪 功能原型 · 内置示例数据 · 新建/编辑/执行均为前端模拟（无真实后端）· 零 CDN 依赖</div>

<script>
/* ============================================================
 * 内联 SVG 图标集（lucide 线条风格，零依赖）
 * ============================================================ */
const ICONS={
  add:'<line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/>',
  search:'<circle cx="11" cy="11" r="7"/><line x1="21" y1="21" x2="16.65" y2="16.65"/>',
  close:'<line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/>',
  play:'<polygon points="6 4 20 12 6 20" fill="currentColor" stroke="none"/>',
  pause:'<rect x="6" y="5" width="4" height="14" rx="1"/><rect x="14" y="5" width="4" height="14" rx="1"/>',
  edit:'<path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"/><path d="M18.5 2.5a2.12 2.12 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"/>',
  trash:'<polyline points="3 6 5 6 21 6"/><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"/>',

/* ============================================================
 * 极简 Markdown 渲染器（零依赖）
 * ============================================================ */
function md2html(md){
  if(!md) return '';
  const lines=String(md).replace(/\r\n/g,'\n').split('\n');
  const inline=(s)=>{
    return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')
      .replace(/`([^`]+)`/g,'<code>$1</code>')
      .replace(/\*\*([^*]+)\*\*/g,'<strong>$1</strong>')
      .replace(/\[([^\]]+)\]\(([^)]+)\)/g,'<a href="$2" target="_blank">$1</a>')
      .replace(/(^|[^*])\*([^*\s][^*]*?)\*/g,'$1<em>$2</em>');
  };
  let html='',i=0;
  const isList=/^\s*[-*]\s+/, isOl=/^\s*\d+\.\s+/, isQuote=/^\s*>\s?/, isHead=/^#{1,3}\s/, isHr=/^\s*---+\s*$/, isCode=/^```/, isTableSep=/^\s*\|?[\s:|\-]+\|?\s*$/;
  while(i<lines.length){
    let line=lines[i];
    if(/^\s*$/.test(line)){ i++; continue; }
    if(isCode.test(line)){ let buf=[]; i++; while(i<lines.length&&!isCode.test(lines[i])){ buf.push(lines[i]); i++; } i++; html+='<pre><code>'+buf.join('\n').replace(/&/g,'&amp;').replace(/</g,'&lt;')+'</code></pre>'; continue; }
    let hm=line.match(/^(#{1,3})\s+(.*)$/);
    if(hm){ html+='<h'+hm[1].length+'>'+inline(hm[2])+'</h'+hm[1].length+'>'; i++; continue; }
    if(isHr.test(line)){ html+='<hr>'; i++; continue; }
    if(/\|/.test(line) && i+1<lines.length && isTableSep.test(lines[i+1])){
      let rows=[line]; i+=2;
      while(i<lines.length && /\|/.test(lines[i])){ rows.push(lines[i]); i++; }
      const parseRow=r=>r.replace(/^\s*\|/,'').replace(/\|\s*$/,'').split('|').map(c=>c.trim());
      const head=parseRow(rows[0]);
      let t='<table><thead><tr>'+head.map(c=>'<th>'+inline(c)+'</th>').join('')+'</tr></thead><tbody>';
      for(let k=1;k<rows.length;k++){ t+='<tr>'+parseRow(rows[k]).map(c=>'<td>'+inline(c)+'</td>').join('')+'</tr>'; }
      html+=t+'</tbody></table>'; continue;
    }
    if(isQuote.test(line)){ let buf=[]; while(i<lines.length&&isQuote.test(lines[i])){ buf.push(lines[i].replace(/^\s*>\s?/,'')); i++; } html+='<blockquote>'+inline(buf.join(' '))+'</blockquote>'; continue; }
    if(isList.test(line)){ let items=[]; while(i<lines.length&&isList.test(lines[i])){ items.push(lines[i].replace(/^\s*[-*]\s+/,'')); i++; } html+='<ul>'+items.map(x=>'<li>'+inline(x)+'</li>').join('')+'</ul>'; continue; }
    if(isOl.test(line)){ let items=[]; while(i<lines.length&&isOl.test(lines[i])){ items.push(lines[i].replace(/^\s*\d+\.\s+/,'')); i++; } html+='<ol>'+items.map(x=>'<li>'+inline(x)+'</li>').join('')+'</ol>'; continue; }
    let buf=[line]; i++;
    while(i<lines.length && !/^\s*$/.test(lines[i]) && !isHead.test(lines[i]) && !isCode.test(lines[i]) && !isList.test(lines[i]) && !isOl.test(lines[i]) && !isQuote.test(lines[i]) && !isHr.test(lines[i]) && !/\|/.test(lines[i])){ buf.push(lines[i]); i++; }
    html+='<p>'+inline(buf.join(' '))+'</p>';
  }
  return html;
}

function esc(s){ return String(s??'').replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c])); }
function fmtTime(iso){ if(!iso) return '—'; return new Date(iso).toLocaleString('zh-CN',{hour12:false}); }
function fmtDur(ms){ if(ms==null) return '—'; if(ms<1000) return ms+'ms'; if(ms<60000) return (ms/1000).toFixed(1)+'s'; return Math.floor(ms/60000)+'m'+Math.round((ms%60000)/1000)+'s'; }
function relativeTime(iso,now){ if(!iso) return '未调度'; const diff=new Date(iso).getTime()-now; if(diff<=0) return '已到期'; const min=Math.floor(diff/60000); if(min<1) return '即将执行'; if(min<60) return min+' 分钟后'; const hr=Math.floor(min/60); if(hr<24) return hr+' 小时后'; return Math.floor(hr/24)+' 天后'; }
const LAST_STATUS_LABEL={completed:'成功',failed:'失败',timeout:'超时',running:'执行中'};

/* ============================================================
 * Cron：校验 + 描述 + 下次触发（简化暴力扫描）
 * ============================================================ */
function cronMatcher(field){
  if(field==='*') return ()=>true;
  return v=>field.split(',').some(seg=>{ let step=1,base=seg; if(seg.includes('/')){ const p=seg.split('/'); base=p[0]; step=+p[1]; } if(base==='*') return v%step===0; if(base.includes('-')){ const [a,b]=base.split('-').map(Number); return v>=a&&v<=b&&(v-a)%step===0; } return v===+base; });
}
function describeCron(expr){
  const parts=(expr||'').trim().split(/\s+/);
  if(parts.length!==5) return {valid:false,error:'需为 5 段：分 时 日 月 周'};
  const [m,h,dom,mon,dow]=parts;
  if(![m,h,dom,mon,dow].every(s=>/^[\d,\-\*\/]+$/.test(s))) return {valid:false,error:'含非法字符（仅支持数字与 * / - , ）'};
  const inRange=(s,lo,hi)=>s.split(',').every(seg=>{ const t=seg.includes('/')?seg.split('/')[0]:seg; if(t==='*') return true; return t.split(/[\/\-]/).filter(Boolean).map(Number).every(n=>!isNaN(n)&&n>=lo&&n<=hi); });
  if(!inRange(m,0,59)) return {valid:false,error:'分钟范围 0-59'};
  if(!inRange(h,0,23)) return {valid:false,error:'小时范围 0-23'};
  if(!inRange(dom,1,31)) return {valid:false,error:'日范围 1-31'};
  if(!inRange(mon,1,12)) return {valid:false,error:'月范围 1-12'};
  if(!inRange(dow,0,6)) return {valid:false,error:'周范围 0-6（0=周日）'};
  const timeStr=(/^\d+$/.test(h)&&/^\d+$/.test(m))?String(h).padStart(2,'0')+':'+String(m).padStart(2,'0'):'';
  const wk=['周日','周一','周二','周三','周四','周五','周六'];
  let desc='';
  if(m.includes('/')) desc='每 '+m.split('/')[1]+' 分钟';
  else if(dom==='*'&&mon==='*'&&dow==='*') desc=timeStr?'每天 '+timeStr:'每天';
  else if(dom==='*'&&mon==='*'&&dow!=='*') desc=(/^\d+$/.test(dow)?'每'+wk[+dow]+' ':'每周 ')+(timeStr||'');
  else if(dow==='*'&&mon==='*'&&/^\d+$/.test(dom)) desc='每月 '+dom+' 号 '+(timeStr||'');
  else desc=(timeStr?timeStr+' ':'')+expr;
  return {valid:true,description:desc};
}
function nextRuns(expr,count){
  count=count||3;
  const p=(expr||'').trim().split(/\s+/); if(p.length!==5) return [];
  const [mf,hf,domf,monf,dowf]=p;
  const mm=cronMatcher(mf),hh=cronMatcher(hf),ddom=cronMatcher(domf),mmon=cronMatcher(monf),ddow=cronMatcher(dowf);
  const domStar=domf==='*',dowStar=dowf==='*';
  const res=[]; const start=new Date(); start.setSeconds(0,0); start.setMinutes(start.getMinutes()+1);
  for(let i=0;i<525600&&res.length<count;i++){
    const d=new Date(start.getTime()+i*60000);
    if(!(mm(d.getMinutes())&&hh(d.getHours())&&mmon(d.getMonth()+1))) continue;
    let dayOk;
    if(domStar&&dowStar) dayOk=true; else if(domStar) dayOk=ddow(d.getDay()); else if(dowStar) dayOk=ddom(d.getDate()); else dayOk=ddom(d.getDate())||ddow(d.getDay());
    if(dayOk) res.push(d.toISOString());
  }
  return res;
}

    else if(fd.type==='select') c='<select class="select" onchange="setFieldValue(\''+fd.key+'\',this.value)">'+(fd.options||[]).map(o=>'<option value="'+o.value+'" '+(v===o.value?'selected':'')+'>'+esc(o.label)+'</option>').join('')+'</select>';
    else if(fd.type==='boolean') c='<label class="toggle"><input type="checkbox" '+(v?'checked':'')+' onchange="setFieldValue(\''+fd.key+'\',this.checked)"/></label>';
    else if(fd.type==='checkbox-group') c=renderCheckboxGroup(fd,v);
    else if(fd.type==='tag-input') c=renderTagInput(fd,v);
    else if(fd.type==='json') c=renderJsonField(fd,v);

function fieldVisible(fd,values){
  const c=fd.showWhen; if(!c) return true; const val=values[c.key];
  if('equals' in c) return val===c.equals; if('includes' in c) return Array.isArray(val)&&val.includes(c.includes); return true;

function renderCheckboxGroup(fd,value){
  const arr=Array.isArray(value)?value:[]; const opts=fd.options||[]; const hasGroup=opts.some(o=>o.group);
  const btn=o=>{ const checked=arr.includes(o.value); return '<button type="button" onclick="toggleArr(\''+fd.key+'\',\''+o.value+'\')" class="check-btn '+(checked?'active':'')+'">'+esc(o.label)+'</button>'; };
  if(!hasGroup) return '<div class="check-row">'+opts.map(btn).join('')+'</div>';
  const groups=new Map();
  for(const o of opts){ const g=o.group||'其他'; if(!groups.has(g)) groups.set(g,[]); groups.get(g).push(o); }
  return '<div class="check-group">'+Array.from(groups.entries()).map(([g,os])=>'<div><div class="cg-title">'+esc(g)+'</div><div class="check-row">'+os.map(btn).join('')+'</div></div>').join('')+'</div>';
}
function renderTagInput(fd,value){
  const arr=Array.isArray(value)?value:[];
  return '<div class="tag-input">'+arr.map(v=>'<span class="tag-pill">'+esc(v)+'<button type="button" onclick="removeTag(\''+fd.key+'\',\''+esc(v)+'\')">×</button></span>').join('')
    +'<input placeholder="'+esc(fd.placeholder||(arr.length?'':'输入后回车'))+'" onkeydown="tagKeydown(event,\''+fd.key+'\')"/></div>';
}
function renderJsonField(fd,value){
  const raw=state.form._jsonRaw?.[fd.key] ?? (value==null?'':JSON.stringify(value,null,2));
  return '<textarea rows="4" class="textarea mono '+(state.form.jsonInvalid?'err':'')+'" placeholder="'+esc(fd.placeholder||'{}')+'" oninput="setJson(\''+fd.key+'\',this.value)">'+esc(raw)+'</textarea>'+(state.form.jsonInvalid?'<div class="err-text" style="margin-top:4px">JSON 格式错误</div>':'');
}
function renderMarkdownField(fd,value){
  const md=String(value??''); const mode=state.form._mdMode??'edit';
  return '<div class="md-wrap"><div class="md-tabs">'
    +'<button type="button" onclick="setMdMode(\'edit\')" class="md-tab '+(mode==='edit'?'active':'')+'">编辑</button>'
    +'<button type="button" onclick="setMdMode(\'preview\')" class="md-tab '+(mode==='preview'?'active':'')+'">预览</button>'
    +'<span class="md-hint">Markdown · 支持 {{占位符}}</span></div>'
    +(mode==='edit'?'<textarea rows="8" class="md-editor" placeholder="'+esc(fd.placeholder||'')+'" oninput="setFieldValue(\''+fd.key+'\',this.value)">'+esc(md)+'</textarea>':'<div class="md-preview prose-md">'+(md.trim()?md2html(md):'<span style="color:var(--g400)">暂无内容，切到「编辑」填写模板</span>')+'</div>')
    +'</div>';
}

/* 频次选择器 */
function renderFreqPicker(){
  const f=state.form,p=f.freq,spec=findSpecById(f.specId);
  const MODES=[{v:'interval',l:'固定间隔'},{v:'daily',l:'每天'},{v:'weekly',l:'每周'},{v:'monthly',l:'每月'},{v:'cron',l:'自定义'}];
  const visible=spec.allowedFreqModes?MODES.filter(m=>spec.allowedFreqModes.includes(m.v)):MODES;
  let body='';
  if(p.mode==='interval'){
    body='<div class="freq-body"><span>每</span><input type="number" min="1" class="input w20" value="'+p.intervalN+'" oninput="setFreq(\'intervalN\',Math.max(1,Number(this.value)||1))"/><select class="input" style="width:auto" onchange="setFreq(\'intervalUnit\',this.value)"><option value="min" '+(p.intervalUnit==='min'?'selected':'')+'>分钟</option><option value="hour" '+(p.intervalUnit==='hour'?'selected':'')+'>小时</option></select><span>执行一次</span></div>';
  } else if(['daily','weekly','monthly'].includes(p.mode)){
    body='<div class="freq-body">'
      +(p.mode==='weekly'?'<select class="input" style="width:auto" onchange="setFreq(\'weekday\',Number(this.value))">'+WEEK.map((w,i)=>'<option value="'+i+'" '+(p.weekday===i?'selected':'')+'>'+w+'</option>').join('')+'</select>':'')
      +(p.mode==='monthly'?'<span>每月</span><input type="number" min="1" max="31" class="input w16" value="'+p.monthDay+'" oninput="setFreq(\'monthDay\',Math.min(31,Math.max(1,Number(this.value)||1)))"/><span>号</span>':'')
      +'<input type="time" class="input" style="width:auto" value="'+p.time+'" oninput="setFreq(\'time\',this.value)"/><span>执行</span></div>';
  } else {
    const val=describeCron(p.cronExpr); const nx=val.valid?nextRuns(p.cronExpr,3):[];
    body='<div><input class="input mono" value="'+esc(p.cronExpr)+'" oninput="setFreq(\'cronExpr\',this.value)" placeholder="如：0 9 * * 1（每周一 9:00）"/>'
      +(p.cronExpr.trim()===''?'':'<div class="cron-result">'+(val.valid?'<span class="cron-ok">✓ '+esc(val.description)+'</span>':'<span class="cron-bad">✗ '+esc(val.error)+'</span>')+'</div>')
      +(val.valid&&nx.length?'<div class="cron-next">接下来：'+nx.map(t=>fmtTime(t)).join('、')+'</div>':'')+'</div>';
  }
  const built=buildFreqConfig(p); const preview=built.scheduleType==='cron'?'cron: '+(built.cronExpr||'—'):'间隔: '+built.intervalSeconds+'s';
  return '<div style="display:flex;flex-direction:column;gap:8px"><div class="freq-modes">'+visible.map(m=>'<button type="button" onclick="setFreq(\'mode\',\''+m.v+'\')" class="freq-mode '+(p.mode===m.v?'active':'')+'">'+m.l+'</button>').join('')+'</div>'+body+'<div class="freq-preview">'+preview+'</div></div>';
}
function buildFreqConfig(p){
  if(p.mode==='interval') return {scheduleType:'interval',intervalSeconds:p.intervalUnit==='hour'?p.intervalN*3600:p.intervalN*60};
  const [hh,mm]=(p.time||'09:00').split(':');
  if(p.mode==='daily') return {scheduleType:'cron',cronExpr:mm+' '+hh+' * * *'};
  if(p.mode==='weekly') return {scheduleType:'cron',cronExpr:mm+' '+hh+' * * '+p.weekday};
  if(p.mode==='monthly') return {scheduleType:'cron',cronExpr:mm+' '+hh+' '+p.monthDay+' * *'};
  return {scheduleType:'cron',cronExpr:p.cronExpr};
}

/* ============================================================
 * Actions
 * ============================================================ */
function setFilter(f){ state.filter=f; render(); }
function setSearch(v){ state.search=v; render(); }
function openNew(){ initForm({task:null}); state.editor={task:null}; renderDrawer(); }
function openEdit(id){ initForm({task:getTask(id)}); state.editor={task:getTask(id)}; renderDrawer(); }
function closeEditor(){ state.editor=null; state.form=null; renderDrawer(); }

function initForm({task}){
  const isEdit=!!task; const specId=task?specIdOf(task):'system:echo'; const spec=findSpecById(specId);
  const values={}; for(const fd of spec.fields){ values[fd.key]=(task?.jobPayload&&task.jobPayload[fd.key]!==undefined)?task.jobPayload[fd.key]:fd.default; }
  let mode='interval';
  const fc={scheduleType:task?.scheduleType??'interval',cronExpr:task?.cronExpr??'',intervalSeconds:task?.intervalSeconds??300};
  let parts=[];
  if(fc.scheduleType==='interval'||fc.intervalSeconds){ mode='interval'; }
  else { parts=(fc.cronExpr||'').trim().split(/\s+/); if(parts.length===5){ const [m,h,dom,mon,dow]=parts; const N=s=>/^\d+$/.test(s);
    if(N(m)&&N(h)&&dom==='*'&&mon==='*'&&dow==='*')mode='daily';
    else if(N(m)&&N(h)&&dom==='*'&&mon==='*'&&N(dow))mode='weekly';
    else if(N(m)&&N(h)&&N(dom)&&mon==='*'&&dow==='*')mode='monthly';
    else mode='cron';
  } else mode='cron'; }
  const time=mode==='interval'?'09:00':(parts.length>=2?String(parts[1]).padStart(2,'0')+':'+String(parts[0]).padStart(2,'0'):'09:00');
  const freq={mode,intervalN:fc.intervalSeconds>=3600&&fc.intervalSeconds%3600===0?fc.intervalSeconds/3600:Math.max(1,Math.round((fc.intervalSeconds||300)/60)),intervalUnit:fc.intervalSeconds>=3600&&fc.intervalSeconds%3600===0?'hour':'min',time,weekday:Number(parts[4])||1,monthDay:Number(parts[2])||1,cronExpr:fc.cronExpr||''};
  if(spec.allowedFreqModes&&!spec.allowedFreqModes.includes(freq.mode)) freq.mode=spec.allowedFreqModes[0];
  state.form={isEdit,name:task?.name??'',desc:task?.description??'',specId,values,freq,isEnabled:task?.isEnabled??true,error:'',saving:false,jsonInvalid:false,_jsonRaw:{},_mdMode:'edit'};
}
function selectSpec(id){ const s=findSpecById(id); if(!s)return; const values={}; for(const fd of s.fields) values[fd.key]=fd.default; const f=state.form; f.specId=id; f.values=values; f.jsonInvalid=false; f._jsonRaw={}; if(s.allowedFreqModes&&!s.allowedFreqModes.includes(f.freq.mode)) f.freq.mode=s.allowedFreqModes[0]; renderDrawer(); }
function setForm(k,v){ state.form[k]=v; renderDrawer(); }
function setFieldValue(k,v){ state.form.values[k]=v; if(['dimensions','criteria','mode'].includes(k)) renderDrawer(); }
function setFreq(k,v){ state.form.freq[k]=v; renderDrawer(); }
function setMdMode(m){ state.form._mdMode=m; renderDrawer(); }
function toggleArr(key,val){ const arr=state.form.values[key]||[]; state.form.values[key]=arr.includes(val)?arr.filter(x=>x!==val):[...arr,val]; renderDrawer(); }
function tagKeydown(e,key){ if(e.key==='Enter'||e.key===','){ e.preventDefault(); const v=e.target.value.trim(); if(v){ const arr=state.form.values[key]||[]; if(!arr.includes(v)) state.form.values[key]=[...arr,v]; e.target.value=''; renderDrawer(); } } else if(e.key==='Backspace'&&!e.target.value){ const arr=state.form.values[key]||[]; if(arr.length){ state.form.values[key]=arr.slice(0,-1); renderDrawer(); } } }
function removeTag(key,v){ state.form.values[key]=(state.form.values[key]||[]).filter(x=>x!==v); renderDrawer(); }
function setJson(key,text){ state.form._jsonRaw[key]=text; if(!text.trim()){ state.form.values[key]={}; state.form.jsonInvalid=false; } else { try{ state.form.values[key]=JSON.parse(text); state.form.jsonInvalid=false; }catch{ state.form.jsonInvalid=true; } } renderDrawer(); }

function saveTask(){
  const f=state.form,spec=findSpecById(f.specId);
  if(!f.name.trim()){ f.error='请填写任务名称'; renderDrawer(); return; }
  for(const fd of spec.fields){ if(fd.required){ const v=f.values[fd.key]; const empty=v==null||v===''||(Array.isArray(v)&&v.length===0); if(empty){ f.error='请填写「'+fd.label+'」'; renderDrawer(); return; } } }
  if(f.jsonInvalid){ f.error='存在 JSON 格式错误'; renderDrawer(); return; }
  f.error=''; f.saving=true; renderDrawer();
  setTimeout(()=>{
    const visibleFields=spec.fields.filter(fd=>fieldVisible(fd,f.values)); const visibleValues={}; visibleFields.forEach(fd=>visibleValues[fd.key]=f.values[fd.key]);
    const payload=spec.jobType==='system'?Object.assign({handlerKey:spec.handlerKey},visibleValues):visibleValues;
    if(spec.id==='system:weekly-report'){ payload.range=buildFreqConfig(f.freq).cronExpr?(f.freq.mode==='weekly'?'last-week':'last-month'):'last-week'; }
    const fc=buildFreqConfig(f.freq);
    const data={name:f.name,description:f.desc||null,jobType:spec.jobType,jobPayload:payload,scheduleType:fc.scheduleType,cronExpr:fc.scheduleType==='cron'?fc.cronExpr:null,intervalSeconds:fc.scheduleType==='interval'?fc.intervalSeconds:null,isEnabled:f.isEnabled};
    if(f.isEdit){ const t=getTask(state.editor.task.id); Object.assign(t,data); t.updatedAt=new Date().toISOString(); recomputeNext(t); }
    else { const t=Object.assign({id:'task_'+Math.random().toString(36).slice(2,8),timezone:'Asia/Shanghai',nextRunAt:null,lastRunAt:null,lastRunStatus:null,lastError:null,createdBy:'admin',createdAt:new Date().toISOString(),updatedAt:new Date().toISOString()},data); recomputeNext(t); SAMPLE_TASKS.push(t); SAMPLE_RUNS[t.id]=[]; }
    state.editor=null; state.form=null; render();
  },350);
}
function recomputeNext(t){
  if(!t.isEnabled){ t.nextRunAt=null; return; }
  if(t.scheduleType==='interval'&&t.intervalSeconds){ t.nextRunAt=new Date(Date.now()+t.intervalSeconds*1000).toISOString(); }
  else if(t.scheduleType==='cron'&&t.cronExpr){ const nx=nextRuns(t.cronExpr,1); t.nextRunAt=nx[0]||null; }
  else t.nextRunAt=null;
}
function toggleTask(id){ const t=getTask(id); t.isEnabled=!t.isEnabled; recomputeNext(t); t.updatedAt=new Date().toISOString(); render(); }
function deleteTask(id){ const t=getTask(id); if(!confirm('确认删除任务「'+t.name+'」？执行历史将一并删除。'))return; const i=SAMPLE_TASKS.findIndex(x=>x.id===id); if(i>=0)SAMPLE_TASKS.splice(i,1); delete SAMPLE_RUNS[id]; if(state.detailTaskId===id){ state.view='list'; state.detailTaskId=null; } render(); }
function runTask(id){
  const t=getTask(id); state.runningId=id; render();
  setTimeout(()=>{
    const dur=300+Math.floor(Math.random()*3000); const isReport=t.jobPayload?.handlerKey==='weekly-report';
    const r={id:'r_'+Math.random().toString(36).slice(2,8),taskId:id,status:'completed',triggerType:'manual',startedAt:new Date().toISOString(),finishedAt:new Date(Date.now()+dur).toISOString(),durationMs:dur,conclusion:simConclusion(t),outputPayload:isReport?{markdown:simReport(t)}:simOutput(t),errorMessage:null,metadata:{simulated:true},createdAt:new Date().toISOString()};
    SAMPLE_RUNS[id]=SAMPLE_RUNS[id]||[]; SAMPLE_RUNS[id].unshift(r);
    t.lastRunAt=r.finishedAt; t.lastRunStatus='completed'; t.lastError=null; t.updatedAt=new Date().toISOString();
    state.runningId=null;
    if(state.view==='detail'){ state.detail.selectedRunId=r.id; render(); }
    else { render(); state.runs={taskId:id,selectedRunId:r.id}; renderDrawer(); }
  },600);
}
function simConclusion(t){ const hk=t.jobPayload?.handlerKey;
  if(hk==='echo') return 'echo ok: '+JSON.stringify(t.jobPayload.params||{});
  if(hk==='trace-cleanup') return '已清理 '+(t.jobPayload.olderThanDays||90)+' 天前的调用追踪 1,203 条（模拟）。';
  if(hk==='employee-cleanup') return '检出疑似离职员工 2 名（detect-only，模拟）：inst_ops_031、inst_sales_011。';
  if(hk==='weekly-report') return '本期报告已生成并存档，详见「报告内容」。';
  if(t.jobType==='agent') return '数字员工执行完成（模拟结论）：任务已按要求处理。';
  return '执行完成（模拟）。';
}
function simOutput(t){ if(t.jobPayload?.handlerKey==='echo') return t.jobPayload.params||{}; if(t.jobType==='agent') return {ok:true}; return {simulated:true}; }
function simReport(t){ return '# '+t.name+'\n\n> 由定时任务自动生成（模拟）\n\n## 总览\n| 指标 | 本期 |\n|---|---|\n| DAU | 1,310 |\n| 日均消息 | 9,560 |\n| Token | 4.3M |\n\n## 活跃时段\n峰值集中在 **10:00-12:00**。\n\n## 改进建议\n1. **登录失败** 占比偏高\n2. 晚高峰响应需关注'; }

function openDetail(id){ state.view='detail'; state.detailTaskId=id; state.runs=null; state.detail={selectedRunId:null}; render(); window.scrollTo(0,0); }
function backToList(){ state.view='list'; state.detailTaskId=null; render(); window.scrollTo(0,0); }
function selectRun(id){ state.detail.selectedRunId=id; render(); }
function selectRunInDrawer(id){ state.runs.selectedRunId=id; renderDrawer(); }
function closeRuns(){ state.runs=null; renderDrawer(); }

/* 倒计时每分钟刷新 */
setInterval(()=>{ state.now=Date.now(); if(state.view==='list'||state.view==='detail') render(); }, 60000);

render();
</script>
