groups:
  - name: human-machine-runtime.core
    interval: 30s
    rules:
      - alert: HMRPlatformUnhealthy
        expr: hmr_health_state < 1
        for: 3m
        labels:
          severity: critical
          service: human-machine-runtime
        annotations:
          summary: "HMR platform health is unhealthy"
          description: "hmr_health_state has been unhealthy for more than 3 minutes."

      - alert: HMRPlatformDegraded
        expr: hmr_health_state == 1
        for: 10m
        labels:
          severity: warning
          service: human-machine-runtime
        annotations:
          summary: "HMR platform is degraded"
          description: "hmr_health_state is degraded for more than 10 minutes."

      - alert: HMROverdueReviews
        expr: hmr_review_overdue_total >= 5
        for: 5m
        labels:
          severity: warning
          service: human-machine-runtime
        annotations:
          summary: "Too many overdue reviews"
          description: "Overdue review count is above threshold."

      - alert: HMRReviewEscalationStorm
        expr: increase(hmr_review_escalation_events_total[15m]) >= 10
        for: 1m
        labels:
          severity: warning
          service: human-machine-runtime
        annotations:
          summary: "Review escalations are spiking"
          description: "Escalation events in last 15m exceeded threshold."

      - alert: HMRInstanceFailureBurst
        expr: hmr_instance_state_total{state="failed"} >= 3
        for: 2m
        labels:
          severity: critical
          service: human-machine-runtime
        annotations:
          summary: "Multiple failed instances"
          description: "Failed instance count exceeded threshold."

      - alert: HMRRuntimeTimeoutFailures
        expr: hmr_instance_failure_reason_total{reason="timeout"} >= 2
        for: 5m
        labels:
          severity: warning
          service: human-machine-runtime
        annotations:
          summary: "Runtime timeout failures detected"
          description: "Instance timeout failure bucket is above threshold."
