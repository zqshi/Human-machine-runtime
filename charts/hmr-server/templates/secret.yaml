apiVersion: v1
kind: Secret
metadata:
  name: {{ include "hmr-server.fullname" . }}-secret
  labels:
    {{- include "hmr-server.labels" . | nindent 4 }}
type: Opaque
stringData:
  {{- range $key, $val := .Values.secrets }}
  {{- if $val }}
  {{ $key }}: {{ $val | quote }}
  {{- end }}
  {{- end }}
  {{- with .Values.gateway }}
  {{- if .matrix.botAccessToken }}
  MATRIX_BOT_ACCESS_TOKEN: {{ .matrix.botAccessToken | quote }}
  {{- end }}
  {{- if .weknora.jwtSecret }}
  WEKNORA_JWT_SECRET: {{ .weknora.jwtSecret | quote }}
  {{- end }}
  {{- end }}
