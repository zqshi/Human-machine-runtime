name: CI

on:
  push:
    branches: ["main", "codex/**"]
  pull_request:

jobs:
  backend:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      - name: Install
        run: npm ci
      - name: Lint
        run: npm run lint
      - name: Type Check
        run: npm run type-check
      - name: Unit Tests
        run: npm test

  frontend:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      - name: Install Root Dependencies
        run: npm ci
      - name: Install Client Suite Dependencies
        run: cd client-suite && npm ci
      - name: TypeCheck
        run: cd client-suite/apps/web && npx tsc --noEmit
      - name: Unit Tests
        run: cd client-suite && npx vitest run
