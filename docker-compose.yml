services:
  postgres:
    image: postgres:16-alpine
    ports:
      # 标准端口映射；若本机 5432 已被占用，改为 "5433:5432" 等避免冲突
      - "5435:5432"
    environment:
      POSTGRES_USER: hmr
      POSTGRES_PASSWORD: hmr
      POSTGRES_DB: hmr
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./scripts/init-weknora-db.sh:/docker-entrypoint-initdb.d/init-weknora-db.sh
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U hmr"]
      interval: 5s
      timeout: 3s
      retries: 5

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  weknora:
    image: weknora/weknora:latest
    ports:
      - "8088:8080"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql://hmr:hmr@postgres:5432/weknora
      REDIS_URL: redis://redis:6379/1
      DISABLE_REGISTRATION: "false"
      SECRET_KEY: weknora-dev-secret-change-in-production
    profiles:
      - weknora
      - full

  conduit:
    image: matrixconduit/matrix-conduit:latest
    ports:
      - "6167:6167"
    environment:
      CONDUIT_CONFIG: /etc/conduit.toml
    volumes:
      - conduit_data:/var/lib/matrix-conduit
      - ./docker/conduit/conduit.toml:/etc/conduit.toml:ro

  # LiteLLM 代理(路径B 降级 / 路径A 企业转发):私有化场景接入企业模型。
  # profile 控制:默认不起;`docker-compose --profile litellm up` 或 `--profile full` 启用。
  # config.yaml 占位指向企业模型,部署时替换(见 docker/litellm/config.yaml)。
  litellm:
    image: ghcr.io/berriai/litellm:main-latest
    ports:
      - "4000:4000"
    volumes:
      - ./docker/litellm/config.yaml:/app/config.yaml:ro
    command: ["--config", "/app/config.yaml", "--port", "4000"]
    environment:
      LITELLM_MASTER_KEY: "${LITELLM_MASTER_KEY:-sk-hmr-litellm-dev}"
      # GLM(智谱)上游 key — 本地实测注入;部署时替换为企业自有模型 key
      GLM_API_KEY: "${GLM_API_KEY:-}"
      # T25 实测:virtual key 生成需 LiteLLM 自有 DB(存 key 元数据);连 host postgres 的 litellm 库
      LITELLM_DATABASE_URL: "${LITELLM_DATABASE_URL:-postgresql://hmr:hmr@host.docker.internal:5435/litellm}"
    profiles:
      - litellm
      - full

  hmr-server:
    build:
      context: ./server
      dockerfile: Dockerfile
    ports:
      - "3002:3002"
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      NODE_ENV: development
      PORT: "3002"
      DATABASE_URL: postgresql://hmr:hmr@postgres:5432/hmr
      JWT_SECRET: hmr-dev-secret-change-in-production
      CREDENTIAL_ENCRYPTION_KEY: hmr-dev-encryption-key-change-me!!
      CORS_ORIGINS: http://localhost:5173,http://localhost:3000,http://localhost:8080
      AUTH_DEFAULT_PROVIDER: local
      MATRIX_HOMESERVER_URL: http://conduit:6167
      MATRIX_BOT_USER_ID: "@hmr-bot:localhost"
      # 路径B(LiteLLM 降级):默认指向 litellm 服务;AGENT_LLM_MODEL 未配则 AgentExecutor 走关键词降级
      LITELLM_BASE_URL: "${LITELLM_BASE_URL:-http://litellm:4000}"
      # 路径A(claude-worker):ANTHROPIC_API_KEY 配置后启用;ANTHROPIC_BASE_URL 经企业代理转发
      ANTHROPIC_API_KEY: "${ANTHROPIC_API_KEY:-}"
      ANTHROPIC_BASE_URL: "${ANTHROPIC_BASE_URL:-}"
      CLAUDE_WORKER_IMAGE: "${CLAUDE_WORKER_IMAGE:-claude-worker:latest}"
      # 外部服务网关(变量名对齐 config/index.ts;留空则对应 client isConfigured=false,调用方守卫拦截)
      MARKETPLACE_API_URL: "${MARKETPLACE_API_URL:-}"
      PROFILE_SERVICE_API_URL: "${PROFILE_SERVICE_API_URL:-}"
      WORKSPACE_BACKEND_API_URL: "${WORKSPACE_BACKEND_API_URL:-}"
      CONTAINER_ORCHESTRATOR_API_URL: "${CONTAINER_ORCHESTRATOR_API_URL:-}"
      PLATFORM_BE_API_URL: "${PLATFORM_BE_API_URL:-}"
      WEKNORA_API_URL: http://weknora:8080
      WEKNORA_ENABLED: "${WEKNORA_ENABLED:-}"
      WEKNORA_ADMIN_API_KEY: "${WEKNORA_ADMIN_API_KEY:-}"

  hmr-web:
    build:
      context: ./client-suite
      dockerfile: Dockerfile
    ports:
      - "8080:80"
    depends_on:
      - hmr-server
    profiles:
      - full

volumes:
  pgdata:
  redis_data:
  conduit_data:
