apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: dcf-server
  namespace: dcf-system
  labels:
    app.kubernetes.io/name: dcf-light-bot
    app.kubernetes.io/component: server
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: dcf-server
  minReplicas: 2
  maxReplicas: 8
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 70
---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: dcf-client
  namespace: dcf-system
  labels:
    app.kubernetes.io/name: dcf-light-bot
    app.kubernetes.io/component: client
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: dcf-client
  minReplicas: 2
  maxReplicas: 5
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 80
