apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: hmr-server
  namespace: hmr-system
  labels:
    app.kubernetes.io/name: human-machine-runtime
    app.kubernetes.io/component: server
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: hmr-server
  minReplicas: 2
  maxReplicas: 8
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 70
---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: hmr-client
  namespace: hmr-system
  labels:
    app.kubernetes.io/name: human-machine-runtime
    app.kubernetes.io/component: client
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: hmr-client
  minReplicas: 2
  maxReplicas: 5
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 80
