apiVersion: apps/v1
kind: Deployment
metadata:
  name: dcf-server
  namespace: dcf-system
  labels:
    app.kubernetes.io/name: dcf-light-bot
    app.kubernetes.io/component: server
    app.kubernetes.io/part-of: dcf-platform
spec:
  replicas: 2
  selector:
    matchLabels:
      app.kubernetes.io/name: dcf-light-bot
      app.kubernetes.io/component: server
  template:
    metadata:
      labels:
        app.kubernetes.io/name: dcf-light-bot
        app.kubernetes.io/component: server
    spec:
      containers:
        - name: server
          image: dcf-server:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 3002
              name: http
          envFrom:
            - configMapRef:
                name: dcf-light-bot-config
            - secretRef:
                name: dcf-light-bot-secret
          readinessProbe:
            httpGet:
              path: /health/ready
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 15
            periodSeconds: 15
          resources:
            requests:
              cpu: 200m
              memory: 256Mi
            limits:
              cpu: "1"
              memory: 512Mi
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: dcf-client
  namespace: dcf-system
  labels:
    app.kubernetes.io/name: dcf-light-bot
    app.kubernetes.io/component: client
    app.kubernetes.io/part-of: dcf-platform
spec:
  replicas: 2
  selector:
    matchLabels:
      app.kubernetes.io/name: dcf-light-bot
      app.kubernetes.io/component: client
  template:
    metadata:
      labels:
        app.kubernetes.io/name: dcf-light-bot
        app.kubernetes.io/component: client
    spec:
      containers:
        - name: client
          image: dcf-client:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 80
              name: http
          readinessProbe:
            httpGet:
              path: /
              port: http
            initialDelaySeconds: 3
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /
              port: http
            initialDelaySeconds: 5
            periodSeconds: 15
          resources:
            requests:
              cpu: 50m
              memory: 64Mi
            limits:
              cpu: 200m
              memory: 128Mi
