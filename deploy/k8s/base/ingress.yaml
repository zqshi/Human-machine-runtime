apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: human-machine-runtime
  namespace: hmr-system
  labels:
    app.kubernetes.io/name: human-machine-runtime
  annotations:
    kubernetes.io/ingress.class: nginx
    nginx.ingress.kubernetes.io/proxy-read-timeout: "300"
    nginx.ingress.kubernetes.io/proxy-send-timeout: "300"
    nginx.ingress.kubernetes.io/websocket-services: hmr-server
spec:
  tls:
    - hosts:
        - hmr.example.com
      secretName: human-machine-runtime-tls
  rules:
    - host: hmr.example.com
      http:
        paths:
          - path: /api
            pathType: Prefix
            backend:
              service:
                name: hmr-server
                port:
                  number: 3002
          - path: /ws
            pathType: Prefix
            backend:
              service:
                name: hmr-server
                port:
                  number: 3002
          - path: /health
            pathType: Prefix
            backend:
              service:
                name: hmr-server
                port:
                  number: 3002
          - path: /
            pathType: Prefix
            backend:
              service:
                name: hmr-client
                port:
                  number: 80
