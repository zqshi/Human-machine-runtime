# HMR Server Secret — 敏感配置示例
# ⚠️  此文件仅为模板，禁止填入真实密钥后提交到 Git
# 生产部署时通过 CI/CD 或 Vault 注入实际值
apiVersion: v1
kind: Secret
metadata:
  name: human-machine-runtime-secret
  namespace: hmr-system
  labels:
    app.kubernetes.io/name: human-machine-runtime
type: Opaque
stringData:
  DATABASE_URL: "replace-me"
  JWT_SECRET: "replace-me"
  CREDENTIAL_ENCRYPTION_KEY: "replace-me"
  LITELLM_API_KEY: "replace-me"
  OIDC_ISSUER: ""
  OIDC_CLIENT_ID: ""
  OIDC_CLIENT_SECRET: ""
