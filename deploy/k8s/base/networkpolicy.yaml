apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: human-machine-runtime-allow-ingress
  namespace: hmr-system
  labels:
    app.kubernetes.io/name: human-machine-runtime
spec:
  podSelector:
    matchLabels:
      app.kubernetes.io/name: human-machine-runtime
  policyTypes:
    - Ingress
  ingress:
    - from:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: ingress-nginx
        - podSelector:
            matchLabels:
              app.kubernetes.io/name: human-machine-runtime
      ports:
        - protocol: TCP
          port: 3002
        - protocol: TCP
          port: 80
