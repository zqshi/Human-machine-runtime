# DCF Server ConfigMap — 非敏感环境变量
# 敏感配置（密钥、密码、Token）请放入 Secret，禁止写入此文件
apiVersion: v1
kind: ConfigMap
metadata:
  name: dcf-light-bot-config
  namespace: dcf-system
  labels:
    app.kubernetes.io/name: dcf-light-bot
data:
  NODE_ENV: "production"
  PORT: "3002"

  # ─── Auth ───────────────────────────────────────────────────────
  AUTH_DEFAULT_PROVIDER: "platform-be-proxy"
  CORS_ORIGINS: "https://dcf.example.com"

  # ─── Rate Limiting ─────────────────────────────────────────────
  RATE_LIMIT_WINDOW_MS: "60000"
  RATE_LIMIT_MAX: "200"

  # ─── Gateway — 内网微服务地址（非敏感，通用占位） ───────────────
  # 部署时替换为企业自有 service 名/namespace（如 platform-be.your-ns:8000）
  PLATFORM_BE_API_URL: "http://platform-be:8000"
  CLAWHUB_API_URL: "http://clawhub:3000"
  PORTAL_API_URL: "http://portal-backend:3000"
  CLAW_FARM_API_URL: "http://claw-farm:8080"
  XSPACE_API_URL: "http://xspace-agent:8000/xspace"
  LITELLM_BASE_URL: "http://litellm:4000"

  # ─── Gateway Resilience ────────────────────────────────────────
  GATEWAY_RETRY_COUNT: "3"
  GATEWAY_CB_THRESHOLD: "5"
  GATEWAY_TIMEOUT_MS: "10000"

  # ─── Matrix IM ─────────────────────────────────────────────────
  MATRIX_HOMESERVER_URL: "http://conduit:6167"
  MATRIX_BOT_USER_ID: "@dcf-bot:localhost"
