{{- if .Values.ingress.enabled }}
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: {{ include "human-machine-runtime.fullname" . }}
  namespace: {{ include "human-machine-runtime.namespace" . }}
  labels:
    {{- include "human-machine-runtime.labels" . | nindent 4 }}
  {{- with .Values.ingress.annotations }}
  annotations:
    {{- toYaml . | nindent 4 }}
  {{- end }}
spec:
  {{- if .Values.ingress.className }}
  ingressClassName: {{ .Values.ingress.className }}
  {{- end }}
  {{- with .Values.ingress.tls }}
  tls:
    {{- toYaml . | nindent 4 }}
  {{- end }}
  rules:
    {{- range .Values.ingress.hosts }}
    - host: {{ .host | quote }}
      http:
        paths:
          {{- range .paths }}
          - path: {{ .path }}
            pathType: {{ .pathType }}
            backend:
              service:
                {{- if eq .backend "server" }}
                name: {{ include "human-machine-runtime.fullname" $ }}-server
                port:
                  number: {{ $.Values.server.service.port }}
                {{- else }}
                name: {{ include "human-machine-runtime.fullname" $ }}-client
                port:
                  number: {{ $.Values.client.service.port }}
                {{- end }}
          {{- end }}
    {{- end }}
{{- end }}
