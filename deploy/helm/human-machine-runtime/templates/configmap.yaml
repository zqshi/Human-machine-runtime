apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "human-machine-runtime.fullname" . }}-config
  namespace: {{ include "human-machine-runtime.namespace" . }}
  labels:
    {{- include "human-machine-runtime.labels" . | nindent 4 }}
data:
{{- range $key, $value := .Values.config }}
  {{ $key }}: {{ $value | quote }}
{{- end }}
