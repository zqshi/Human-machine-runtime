{{- if .Values.pdb.enabled }}
apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: {{ include "human-machine-runtime.fullname" . }}-server
  namespace: {{ include "human-machine-runtime.namespace" . }}
  labels:
    {{- include "human-machine-runtime.serverLabels" . | nindent 4 }}
spec:
  minAvailable: {{ .Values.pdb.minAvailable }}
  selector:
    matchLabels:
      {{- include "human-machine-runtime.serverSelector" . | nindent 6 }}
{{- end }}
