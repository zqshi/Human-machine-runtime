# HMR Light Bot — 生产环境 values override
# ⚠️  敏感配置（密钥、密码）通过外部 Secret 注入，不在此文件中填写
# 使用方式: helm install -f values.yaml -f values-prod.yaml human-machine-runtime ./

namespace:
  name: hmr-system

# ─── Server ──────────────────────────────────────────────────────
server:
  replicaCount: 2
  image:
    # 通用镜像仓库占位，部署时替换为企业自有 registry
    repository: ghcr.io/your-org/hmr-server
    tag: stable
    pullPolicy: IfNotPresent
  resources:
    requests:
      cpu: 200m
      memory: 256Mi
    limits:
      cpu: "1"
      memory: 512Mi
  autoscaling:
    enabled: true
    minReplicas: 2
    maxReplicas: 8
    cpuAverageUtilization: 70

# ─── Client ──────────────────────────────────────────────────────
client:
  replicaCount: 2
  image:
    # 通用镜像仓库占位，部署时替换为企业自有 registry
    repository: ghcr.io/your-org/hmr-client
    tag: stable
    pullPolicy: IfNotPresent
  autoscaling:
    enabled: true
    minReplicas: 2
    maxReplicas: 5
    cpuAverageUtilization: 80

# ─── Ingress ─────────────────────────────────────────────────────
ingress:
  enabled: true
  className: nginx
  hosts:
    - host: hmr.your-domain.example.com
      paths:
        - path: /api
          pathType: Prefix
          backend: server
        - path: /ws
          pathType: Prefix
          backend: server
        - path: /health
          pathType: Prefix
          backend: server
        - path: /
          pathType: Prefix
          backend: client
  tls:
    - secretName: human-machine-runtime-tls
      hosts:
        - hmr.your-domain.example.com

# ─── Config（非敏感）──────────────────────────────────────────────
config:
  NODE_ENV: "production"
  PORT: "3002"
  AUTH_DEFAULT_PROVIDER: "platform-be-proxy"
  CORS_ORIGINS: "https://hmr.your-domain.example.com"
  RATE_LIMIT_WINDOW_MS: "60000"
  RATE_LIMIT_MAX: "200"
  # Gateway — 内网微服务地址（通用占位，部署时替换为企业自有 service 名/namespace）
  PLATFORM_BE_API_URL: "http://platform-be:8000"
  CLAWHUB_API_URL: "http://clawhub:3000"
  PORTAL_API_URL: "http://portal-backend:3000"
  CLAW_FARM_API_URL: "http://claw-farm:8080"
  XSPACE_API_URL: "http://xspace-agent:8000/xspace"
  LITELLM_BASE_URL: "http://litellm:4000"
  GATEWAY_RETRY_COUNT: "3"
  GATEWAY_CB_THRESHOLD: "5"
  GATEWAY_TIMEOUT_MS: "10000"

# ─── Secrets（引用外部 Secret，不在此处填写真实值）─────────────────
secrets:
  create: false
  name: human-machine-runtime-secret

# ─── PDB ─────────────────────────────────────────────────────────
pdb:
  enabled: true
  minAvailable: 1

# ─── Network Policy ──────────────────────────────────────────────
networkPolicy:
  enabled: true
  ingress:
    allowedNamespaces:
      - ingress-nginx
