namespace:
  name: hmr-system-dev

image:
  tag: dev

replicaCount: 1

ingress:
  hosts:
    - host: hmr-dev.example.com
      paths:
        - path: /
          pathType: Prefix
  tls:
    - secretName: human-machine-runtime-dev-tls
      hosts:
        - hmr-dev.example.com

hpa:
  enabled: false

networkPolicy:
  ingress:
    allowedNamespaces:
      - ingress-nginx
      - hmr-system-dev

config:
  PLATFORM_BASE_URL: "https://hmr-dev.example.com"
  KUBERNETES_NAMESPACE_PREFIX: "hmr-dev"
  AUDIT_RETENTION_TTL_DAYS: "7"
  ASSET_REVIEW_SLA_HOURS: "8"
  METRICS_REFRESH_INTERVAL_MS: "30000"
