{{- if .Values.networkPolicy.enabled }}
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: {{ include "dcf-light-bot.fullname" . }}-allow-ingress
  namespace: {{ include "dcf-light-bot.namespace" . }}
  labels:
    {{- include "dcf-light-bot.labels" . | nindent 4 }}
spec:
  podSelector:
    matchLabels:
      app.kubernetes.io/name: {{ include "dcf-light-bot.name" . }}
      app.kubernetes.io/instance: {{ .Release.Name }}
  policyTypes:
    - Ingress
  ingress:
    - from:
        {{- range .Values.networkPolicy.ingress.allowedNamespaces }}
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: {{ . | quote }}
        {{- end }}
        - podSelector:
            matchLabels:
              app.kubernetes.io/name: {{ include "dcf-light-bot.name" . }}
      ports:
        - protocol: TCP
          port: 3002
        - protocol: TCP
          port: 80
{{- end }}
