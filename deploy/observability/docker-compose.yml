version: '3.9'

services:
  prometheus:
    image: prom/prometheus:v2.55.0
    container_name: hmr-prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--web.enable-lifecycle'
    ports:
      - '9090:9090'
    volumes:
      - ../../docs/monitoring/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - ../../docs/monitoring/prometheus-alert-rules.yaml:/etc/prometheus/prometheus-alert-rules.yaml:ro
      - prometheus-data:/prometheus
    restart: unless-stopped

  alertmanager:
    image: prom/alertmanager:v0.28.1
    container_name: hmr-alertmanager
    command:
      - '--config.file=/etc/alertmanager/alertmanager.yml'
      - '--storage.path=/alertmanager'
    ports:
      - '9093:9093'
    volumes:
      - ../../docs/monitoring/alertmanager.yml:/etc/alertmanager/alertmanager.yml:ro
      - alertmanager-data:/alertmanager
    restart: unless-stopped

  grafana:
    image: grafana/grafana:11.2.2
    container_name: hmr-grafana
    environment:
      - GF_SECURITY_ADMIN_USER=admin
      - GF_SECURITY_ADMIN_PASSWORD=admin
      - GF_USERS_ALLOW_SIGN_UP=false
    ports:
      - '3001:3000'
    volumes:
      - ../../docs/monitoring/grafana/provisioning:/etc/grafana/provisioning:ro
      - ../../docs/monitoring/grafana-dashboard-human-machine-runtime.json:/var/lib/grafana/dashboards/human-machine-runtime.json:ro
      - grafana-data:/var/lib/grafana
    depends_on:
      - prometheus
    restart: unless-stopped

volumes:
  prometheus-data:
  alertmanager-data:
  grafana-data:
