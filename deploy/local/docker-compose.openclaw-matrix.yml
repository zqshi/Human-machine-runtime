services:
  matrix-synapse:
    image: ghcr.io/element-hq/synapse:latest
    container_name: hmr-matrix-synapse
    restart: unless-stopped
    ports:
      - "8008:8008"
    volumes:
      - ../../runtime/matrix/data:/data
    environment:
      SYNAPSE_CONFIG_PATH: /data/homeserver.yaml
    networks:
      - hmr-network

  openclaw-gateway:
    image: openclaw:local
    container_name: hmr-openclaw-gateway
    depends_on:
      - matrix-synapse
    restart: unless-stopped
    environment:
      HOME: /home/node
      TERM: xterm-256color
      OPENCLAW_GATEWAY_TOKEN: ${OPENCLAW_GATEWAY_TOKEN:-hmr-local-token}
    volumes:
      - ../../runtime/openclaw/config:/home/node/.openclaw
      - ../../runtime/openclaw/workspace:/home/node/.openclaw/workspace
    ports:
      - "18789:18789"
      - "18790:18790"
    init: true
    command:
      [
        "node",
        "dist/index.js",
        "gateway",
        "--allow-unconfigured",
        "--bind",
        "lan",
        "--port",
        "18789"
      ]
    networks:
      - hmr-network

  matrix-element-web:
    image: vectorim/element-web:v1.12.11
    container_name: hmr-matrix-element-web
    depends_on:
      - matrix-synapse
    restart: unless-stopped
    ports:
      - "8081:80"
    volumes:
      - ./element-web-config.json:/app/config.json:ro
      - ./element-assets/hmr-login-logo.svg:/app/hmr-login-logo.svg:ro
      - ./element-assets/hmr-login-bg.svg:/app/hmr-login-bg.svg:ro
      - ./element-assets/welcome.html:/app/welcome.html:ro
      - ./element-assets/hmr-matrix-locale.js:/app/hmr-matrix-locale.js:ro
      - ./element-assets/hmr-matrix-drawer.js:/app/hmr-matrix-drawer.js:ro
      - ./element-assets/nginx-default.conf:/etc/nginx/templates/default.conf.template:ro
      - ../../src/interfaces/http/lite-ui:/app/lite:ro
      - ../../node_modules/matrix-js-sdk/dist:/app/lite_vendor:ro
      - ../../client-suite/apps/web/dist:/app/client-suite:ro
    networks:
      - hmr-network

  # ─── WeKnora RAG Services ──────────────────────────────────────────
  # TODO: 投产前验证镜像名 — 运行 docker pull 确认以下镜像存在
  #       若 WeKnora 官方镜像名不同，需同步修改此处和 nginx 反代
  weknora-pg:
    image: pgvector/pgvector:pg16
    container_name: hmr-weknora-pg
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${WEKNORA_DB_USER:-postgres}
      POSTGRES_PASSWORD: ${WEKNORA_DB_PASSWORD:-postgres123}
      POSTGRES_DB: ${WEKNORA_DB_NAME:-weknora}
    volumes:
      - weknora-pg-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${WEKNORA_DB_USER:-postgres}"]
      interval: 5s
      timeout: 3s
      retries: 10
    networks:
      - hmr-network

  weknora-redis:
    image: redis:7-alpine
    container_name: hmr-weknora-redis
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10
    networks:
      - hmr-network

  weknora-docreader:
    image: wechatopenai/weknora-docreader:latest
    container_name: hmr-weknora-docreader
    restart: unless-stopped
    networks:
      - hmr-network

  weknora-app:
    image: wechatopenai/weknora-app:latest
    container_name: hmr-weknora-app
    restart: unless-stopped
    depends_on:
      weknora-pg:
        condition: service_healthy
      weknora-redis:
        condition: service_healthy
      weknora-docreader:
        condition: service_started
    ports:
      - "${WEKNORA_FRONTEND_PORT:-19000}:8080"
    environment:
      # DB_DRIVER / RETRIEVE_DRIVER 必传——缺则 WeKnora initDatabase 读空 driver 直接 panic
      # （对齐 Tencent/WeKnora 官方 .env.example；RETRIEVE_DRIVER=postgres 走 pgvector）
      DB_DRIVER: postgres
      DB_HOST: weknora-pg
      DB_PORT: 5432
      DB_USER: ${WEKNORA_DB_USER:-postgres}
      DB_PASSWORD: ${WEKNORA_DB_PASSWORD:-postgres123}
      DB_NAME: ${WEKNORA_DB_NAME:-weknora}
      RETRIEVE_DRIVER: postgres
      # WeKnora 读 REDIS_ADDR（非 REDIS_HOST）；不配则进 Lite 模式，配上启用 Redis 流处理
      REDIS_ADDR: weknora-redis:6379
      REDIS_PASSWORD: ${WEKNORA_REDIS_PASSWORD:-}
      STREAM_MANAGER_TYPE: redis
      DOC_READER_ADDR: weknora-docreader:50051
      JWT_SECRET: ${WEKNORA_JWT_SECRET:-weknora-jwt-secret}
      STORAGE_TYPE: ${WEKNORA_STORAGE_TYPE:-local}
      LLM_BASE_URL: ${WEKNORA_LLM_BASE_URL:-http://host.docker.internal:11434}
    volumes:
      - weknora-storage:/data
    networks:
      - hmr-network

  weknora-ui:
    image: wechatopenai/weknora-ui:latest
    container_name: hmr-weknora-ui
    restart: unless-stopped
    depends_on:
      - weknora-app
    ports:
      - "19001:80"
    networks:
      - hmr-network

networks:
  hmr-network:
    driver: bridge

volumes:
  weknora-pg-data:
  weknora-storage:
