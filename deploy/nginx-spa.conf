server {
    listen 80;
    root /usr/share/nginx/html;
    index index.html;

    client_max_body_size 50m;

    # Security headers
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header X-XSS-Protection "0" always;

    # API proxy — all backend routes
    location /api/ {
        proxy_pass http://dcf-server:3002;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 300s;
        proxy_buffering off;
        proxy_cache off;
    }

    # SSE — long-lived connections
    location /api/openclaw/sse {
        proxy_pass http://dcf-server:3002;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header Connection '';
        proxy_http_version 1.1;
        chunked_transfer_encoding off;
        proxy_buffering off;
        proxy_cache off;
        proxy_read_timeout 86400s;
    }

    # WebSocket connections
    location /ws/ {
        proxy_pass http://dcf-server:3002;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_read_timeout 86400s;
    }

    # Health check proxy
    location /health {
        proxy_pass http://dcf-server:3002;
        proxy_set_header Host $host;
    }

    # Admin platform — MPA entry
    location /admin/ {
        try_files $uri $uri/ /admin.html;
        expires 1h;
        add_header Cache-Control "public, no-transform";
    }

    # Ops platform — MPA entry
    location /ops/ {
        try_files $uri $uri/ /ops.html;
        expires 1h;
        add_header Cache-Control "public, no-transform";
    }

    # SPA fallback — user client
    location / {
        try_files $uri $uri/ /index.html;
        expires 1h;
        add_header Cache-Control "public, no-transform";
    }

    # Static asset caching
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff2?)$ {
        expires 30d;
        add_header Cache-Control "public, immutable";
    }

    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml application/xml+rss text/javascript image/svg+xml;
}
